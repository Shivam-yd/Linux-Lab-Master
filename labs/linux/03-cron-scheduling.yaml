id: "linux-cron-scheduling"
title: "Cron & Task Scheduling"
track: "linux"
level: 2
category: "System Administration"
difficulty: "intermediate"
summary: "Schedule recurring and one-off jobs on Linux using cron and at, and verify they run correctly."
estimatedMinutes: 30
order: 202

objectives:
  - "Write cron expressions for common recurring schedules"
  - "Install a crontab for the current user"
  - "Redirect cron job output to a log file"
  - "Schedule a one-off job with at"

instructions: |
  ## Cron & Task Scheduling

  **Scenario**
  Your team needs two automation tasks set up on a production server: a recurring heartbeat job that timestamps a log file every minute (used by the monitoring system to confirm the cron daemon is healthy), and a one-off maintenance task to run shortly after a deployment window opens. Both must be in place before the next deployment in 30 minutes.

  **Your task:** Install a root crontab that appends the current date to `/var/log/heartbeat-cron.log` every minute, confirm the job has executed at least once, and schedule a one-off `at` job that writes `scheduled-task-ran` to `/root/at-output.txt`.

  **What You'll Deliver**
  - Root crontab entry running `date >> /var/log/heartbeat-cron.log` every minute
  - `/var/log/heartbeat-cron.log` with at least one entry confirming the job ran
  - `/root/at-output.txt` containing `scheduled-task-ran` from the `at` job

  ## Steps

  1. `(crontab -l 2>/dev/null; echo '* * * * * date >> /var/log/heartbeat-cron.log') | crontab -`
  2. `crontab -l`
  3. Wait ~60 seconds, then: `cat /var/log/heartbeat-cron.log`
  4. `echo "echo scheduled-task-ran > /root/at-output.txt" | at now + 1 minute`
  5. After a minute: `cat /root/at-output.txt`

tasks:
  - id: "install-crontab"
    description: "Add a cron job for root that appends the current date to /var/log/heartbeat-cron.log every minute"
  - id: "verify-cron-running"
    description: "Confirm the cron daemon is running and the job has executed at least once, leaving output in /var/log/heartbeat-cron.log"
  - id: "schedule-at-job"
    description: "Use the at command to schedule a one-off job that writes 'scheduled-task-ran' to /root/at-output.txt"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /var/log /var/spool/at
  # Alpine's BusyBox has crond/crontab built in, but no `at` — there's no
  # network access in this sandbox to apt/apk install one, so provide a
  # minimal at(1)-compatible shim: it reads a job from stdin and runs it
  # after the delay parsed from "now + N minute(s)|hour(s)". Unsupported
  # time specs are rejected instead of silently running immediately.
  cat > /usr/local/bin/at <<'EOF'
  #!/bin/sh
  args="$*"
  case "$args" in
    *hour*) n=$(echo "$args" | grep -oE '[0-9]+' | head -1); delay=$((n * 3600)) ;;
    *minute*) n=$(echo "$args" | grep -oE '[0-9]+' | head -1); delay=$((n * 60)) ;;
    *)
      echo "at: unsupported time spec '$args' — use 'now + N minute(s)' or 'now + N hour(s)'" >&2
      exit 1
      ;;
  esac
  job=$(cat)
  ( sleep "$delay"; sh -c "$job" ) >/var/spool/at/last.log 2>&1 &
  echo "job $! scheduled at now $args"
  EOF
  chmod +x /usr/local/bin/at
  crond
  echo "Cron lab ready. crond is running and at is available." > /etc/motd

verifyScript: |
  # CHECK: install-crontab
  # Must be a cron entry that runs every minute (5-field "* * * * *") and
  # appends the date to the required log file — not just any mention of it.
  if crontab -l 2>/dev/null | grep -qE '^\*[[:space:]]+\*[[:space:]]+\*[[:space:]]+\*[[:space:]]+\*[[:space:]]+.*date.*>>.*heartbeat-cron\.log'; then
    echo "CHECK:install-crontab:PASS:Every-minute crontab entry appending to heartbeat-cron.log found"
  else
    echo "CHECK:install-crontab:FAIL:No every-minute crontab entry appending 'date' output to /var/log/heartbeat-cron.log"
  fi

  # CHECK: verify-cron-running
  # crond must be running AND the log must actually contain output — not just exist.
  if pgrep crond >/dev/null && [ -s /var/log/heartbeat-cron.log ]; then
    echo "CHECK:verify-cron-running:PASS:cron daemon is running and the job has produced output"
  else
    echo "CHECK:verify-cron-running:FAIL:cron daemon not running, or /var/log/heartbeat-cron.log is missing/empty (wait a minute after installing the crontab)"
  fi

  # CHECK: schedule-at-job
  if [ -f /root/at-output.txt ] && grep -q "scheduled-task-ran" /root/at-output.txt; then
    echo "CHECK:schedule-at-job:PASS:at job wrote expected output"
  else
    echo "CHECK:schedule-at-job:FAIL:/root/at-output.txt missing or does not contain expected text"
  fi

hints:
  - "Add the crontab entry without an editor: `(crontab -l 2>/dev/null; echo '* * * * * date >> /var/log/heartbeat-cron.log') | crontab -`"
  - "Wait ~60s after installing the crontab, then check `cat /var/log/heartbeat-cron.log`"
  - "Schedule an at job with: `echo \"echo scheduled-task-ran > /root/at-output.txt\" | at now + 1 minute`"
  - "If crond isn't running, start it with `crond`"
