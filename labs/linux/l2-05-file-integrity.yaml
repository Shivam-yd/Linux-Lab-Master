# ──────────────────────────────────────────────────────────────────────────────
# Linux Lab: File Integrity & Checksums (Level 2 - Intermediate)
# ──────────────────────────────────────────────────────────────────────────────

id: "linux-file-integrity"
title: "File Integrity & Checksums"
track: "linux"
level: 2
category: "Security"
difficulty: "intermediate"
summary: "Use sha256sum and diff to verify a release file wasn't corrupted, and detect tampering between two config versions."
estimatedMinutes: 20
order: 224

objectives:
  - "Generate and validate a SHA-256 checksum file"
  - "Use sha256sum -c to verify integrity against a known-good checksum"
  - "Detect differences between two versions of a file"

instructions: |
  ## File Integrity & Checksums

  **Scenario**
  A release artifact was pulled from an external mirror and a config file was copied across servers — both over untrusted networks. Before you deploy either, you need to prove they weren't corrupted or silently modified in transit. The security policy also requires a diff report any time two config versions are compared.

  **Your task:** Generate a SHA-256 checksum for `/data/release.tar`, verify `/data/config.yaml` against its known-good checksum in `/data/expected.sha256`, and diff `/data/original.conf` against `/data/modified.conf` saving all outputs to `/root/`.

  **What You'll Deliver**
  - `/data/release.tar.sha256` containing the SHA-256 checksum of the release archive
  - `/root/verify-result.txt` showing the `sha256sum -c` result for `config.yaml`
  - `/root/diff-result.txt` capturing the differences between the two config versions

  ## Steps

  1. `sha256sum /data/release.tar > /data/release.tar.sha256`
  2. `cd /data && sha256sum -c expected.sha256 > /root/verify-result.txt`
  3. `diff /data/original.conf /data/modified.conf > /root/diff-result.txt; true`

tasks:
  - id: "generate-checksum"
    description: "Generate /data/release.tar.sha256 for /data/release.tar"
  - id: "verify-integrity"
    description: "Run sha256sum -c against /data/expected.sha256 and save the output to /root/verify-result.txt"
  - id: "detect-tampering"
    description: "Diff /data/original.conf against /data/modified.conf and save the output to /root/diff-result.txt"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /data
  dd if=/dev/urandom of=/data/release.tar bs=1K count=2 2>/dev/null
  echo "port=8080" > /data/config.yaml
  sha256sum /data/config.yaml > /data/expected.sha256
  echo "version=1.0" > /data/original.conf
  echo "version=1.1" > /data/modified.conf

verifyScript: |
  # CHECK: generate-checksum
  if [ -f /data/release.tar.sha256 ] && sha256sum -c /data/release.tar.sha256 >/dev/null 2>&1; then
    echo "CHECK:generate-checksum:PASS:release.tar.sha256 exists and validates correctly"
  else
    echo "CHECK:generate-checksum:FAIL:/data/release.tar.sha256 missing or does not match release.tar"
  fi

  # CHECK: verify-integrity
  if [ -f /root/verify-result.txt ] && grep -qi "OK" /root/verify-result.txt; then
    echo "CHECK:verify-integrity:PASS:verify-result.txt shows a successful integrity check"
  else
    echo "CHECK:verify-integrity:FAIL:/root/verify-result.txt missing or doesn't show OK"
  fi

  # CHECK: detect-tampering
  if [ -s /root/diff-result.txt ]; then
    echo "CHECK:detect-tampering:PASS:diff-result.txt captures the difference between the two files"
  else
    echo "CHECK:detect-tampering:FAIL:/root/diff-result.txt is missing or empty"
  fi

hints:
  - "`sha256sum /data/release.tar > /data/release.tar.sha256` writes the checksum in the format sha256sum -c expects."
  - "Run the check from inside /data so relative paths in expected.sha256 resolve: `cd /data && sha256sum -c expected.sha256 > /root/verify-result.txt`"
  - "`diff /data/original.conf /data/modified.conf > /root/diff-result.txt` — diff exits non-zero when files differ, that's expected."
