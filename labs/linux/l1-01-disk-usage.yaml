# ──────────────────────────────────────────────────────────────────────────────
# Linux Lab: Disk Usage Investigation (Level 1 - Foundation)
# ──────────────────────────────────────────────────────────────────────────────

id: "linux-disk-usage"
title: "Disk Usage Investigation"
track: "linux"
level: 1
category: "Linux Fundamentals"
difficulty: "beginner"
summary: "A server alert says disk space is running low. Use du, df, and find to locate the culprit and free up space."
estimatedMinutes: 20
order: 15

objectives:
  - "Read df -h output to check overall disk usage"
  - "Use find to locate the largest file in a directory tree"
  - "Remove stale files to reclaim disk space"

instructions: |
  ## Disk Usage Investigation

  Your monitoring system just paged you: `/` is at 90% capacity on the app
  server. This is one of the most common real-world Linux incidents — and
  almost always the fix is the same: find what's eating space, confirm it's
  safe to remove, then remove it.

  ### What you need to do

  1. Somewhere under `/var/log/app` there's an unusually large file. Find it
     with `find /var/log/app -type f -printf '%s %p\n' | sort -rn | head -1`
     (or `du -a /var/log/app | sort -rn | head -1`) and write **just its full
     path** to `/root/largest-log.txt`.
  2. `/var/log/app/archive/` contains old rotated logs ending in `.old` that
     are no longer needed. Delete all of them.
  3. Run `df -h /` and save the full output to `/root/disk-report.txt` — this
     is the kind of evidence you'd attach to an incident ticket.

  ### Reference

  ```bash
  df -h /                          # overall disk usage
  du -sh /var/log/app/*            # size per file/dir
  find /var/log/app -type f -printf '%s %p\n' | sort -rn
  ```

tasks:
  - id: "identify-culprit"
    description: "Find the largest file under /var/log/app and write its full path to /root/largest-log.txt"
  - id: "free-up-space"
    description: "Delete all *.old files under /var/log/app/archive/"
  - id: "disk-report"
    description: "Save the output of `df -h /` to /root/disk-report.txt"

image: "ubuntu:24.04"
shell: "bash"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /var/log/app/archive
  dd if=/dev/zero of=/var/log/app/huge.log bs=1M count=5 2>/dev/null
  dd if=/dev/zero of=/var/log/app/small.log bs=1K count=10 2>/dev/null
  for i in 1 2 3; do dd if=/dev/zero of=/var/log/app/archive/backup-$i.log.old bs=1K count=50 2>/dev/null; done

verifyScript: |
  # CHECK: identify-culprit
  if [ -f /root/largest-log.txt ] && grep -q "huge.log" /root/largest-log.txt; then
    echo "CHECK:identify-culprit:PASS:Correctly identified huge.log as the largest file"
  else
    echo "CHECK:identify-culprit:FAIL:/root/largest-log.txt missing or does not point to huge.log"
  fi

  # CHECK: free-up-space
  if ! ls /var/log/app/archive/*.old >/dev/null 2>&1; then
    echo "CHECK:free-up-space:PASS:All .old files removed from archive/"
  else
    echo "CHECK:free-up-space:FAIL:.old files still present under /var/log/app/archive/"
  fi

  # CHECK: disk-report
  if [ -s /root/disk-report.txt ] && grep -q "%" /root/disk-report.txt; then
    echo "CHECK:disk-report:PASS:disk-report.txt contains df -h output"
  else
    echo "CHECK:disk-report:FAIL:/root/disk-report.txt missing or empty"
  fi

hints:
  - "`du -sh /var/log/app/*` shows the size of each file in the directory."
  - "The largest file is huge.log — write its full path (/var/log/app/huge.log) to /root/largest-log.txt with `echo`."
  - "`rm /var/log/app/archive/*.old` removes all matching files at once."
  - "`df -h / > /root/disk-report.txt` redirects the command's output straight into the file."
