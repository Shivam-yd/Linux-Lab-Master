id: "linux-process-management"
title: "Process Management & Signals"
track: "linux"
level: 2
category: "System Administration"
difficulty: "intermediate"
summary: "Monitor, control, and signal Linux processes using ps, top, kill, nice, and systemd."
estimatedMinutes: 35
order: 201

objectives:
  - "Identify resource-heavy processes with ps and top"
  - "Send signals (SIGTERM, SIGKILL, SIGHUP) to processes"
  - "Adjust process priority with nice and renice"
  - "Create and manage a basic systemd unit"

instructions: |
  ## Process Management & Signals

  **Scenario**
  Your team's app server is running sluggishly and another engineer suspects a runaway background script is consuming CPU. You need to identify the offending process, deprioritise it so production traffic can recover, and then shut it down cleanly — without a hard reboot that would lose in-flight requests.

  **Your task:** Launch a background heartbeat process that logs to `/tmp/heartbeat.log`, record its PID in `/tmp/heartbeat.pid`, lower its scheduling priority to `+10`, then terminate it gracefully with `SIGTERM`.

  **What You'll Deliver**
  - `/tmp/heartbeat.log` with at least two timestamped entries
  - `/tmp/heartbeat.pid` containing the process PID
  - Heartbeat process reniced to `+10`
  - Process stopped cleanly via `SIGTERM`

  ## Steps

  1. `while true; do date >> /tmp/heartbeat.log; sleep 1; done & echo $! > /tmp/heartbeat.pid`
  2. `cat /tmp/heartbeat.pid | xargs ps -p`
  3. `renice -n 10 -p $(cat /tmp/heartbeat.pid) && ps -o ni= -p $(cat /tmp/heartbeat.pid) > /tmp/heartbeat-nice.txt`
  4. `kill -SIGTERM $(cat /tmp/heartbeat.pid)`
  5. `kill -0 $(cat /tmp/heartbeat.pid) 2>/dev/null && echo "still running" || echo "stopped"`

tasks:
  - id: "background-proc"
    description: "Start a background process that writes the date every second to /tmp/heartbeat.log"
  - id: "find-pid"
    description: "Write the PID of that process to /tmp/heartbeat.pid"
  - id: "renice-proc"
    description: "Renice the heartbeat process to +10"
  - id: "graceful-stop"
    description: "Send SIGTERM to the heartbeat process so it exits cleanly"

image: "ubuntu:24.04"
shell: "bash"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  apt-get update -qq && apt-get install -y -qq procps
  echo "Process lab ready"

verifyScript: |
  # CHECK: background-proc
  if [[ -f /tmp/heartbeat.log ]] && [[ $(wc -l < /tmp/heartbeat.log) -ge 2 ]]; then
    echo "CHECK:background-proc:PASS:heartbeat.log exists and has entries"
  else
    echo "CHECK:background-proc:FAIL:/tmp/heartbeat.log missing or empty"
  fi

  # CHECK: find-pid
  if [[ -f /tmp/heartbeat.pid ]]; then
    echo "CHECK:find-pid:PASS:heartbeat.pid exists"
  else
    echo "CHECK:find-pid:FAIL:/tmp/heartbeat.pid not found"
  fi

  # CHECK: renice-proc
  if [[ -f /tmp/heartbeat-nice.txt ]] && [[ $(tr -d '[:space:]' < /tmp/heartbeat-nice.txt) == "10" ]]; then
    echo "CHECK:renice-proc:PASS:Process was reniced to +10"
  else
    echo "CHECK:renice-proc:FAIL:Nice value not confirmed at +10 (run: renice -n 10 -p \$(cat /tmp/heartbeat.pid) && ps -o ni= -p \$(cat /tmp/heartbeat.pid) > /tmp/heartbeat-nice.txt)"
  fi

  # CHECK: graceful-stop
  if [[ -f /tmp/heartbeat.pid ]]; then
    pid=$(cat /tmp/heartbeat.pid)
    if ! kill -0 "$pid" 2>/dev/null; then
      echo "CHECK:graceful-stop:PASS:Process $pid is no longer running"
    else
      echo "CHECK:graceful-stop:FAIL:Process $pid is still running"
    fi
  else
    echo "CHECK:graceful-stop:FAIL:/tmp/heartbeat.pid missing"
  fi

hints:
  - "Run in background: `while true; do date >> /tmp/heartbeat.log; sleep 1; done & echo $! > /tmp/heartbeat.pid`"
  - "Check it's running: `cat /tmp/heartbeat.pid | xargs ps -p`"
  - "Renice and capture: `renice -n 10 -p $(cat /tmp/heartbeat.pid) && ps -o ni= -p $(cat /tmp/heartbeat.pid) > /tmp/heartbeat-nice.txt`"
  - "Stop it: `kill -SIGTERM $(cat /tmp/heartbeat.pid)`"
