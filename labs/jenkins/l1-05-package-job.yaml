# ──────────────────────────────────────────────────────────────────────────────
# Jenkins Lab: Configure Jenkins Job for Package Installation (Level 1)
# ──────────────────────────────────────────────────────────────────────────────

id: "jenkins-package-job"
title: "Configure Jenkins Job for Package Installation"
track: "jenkins"
level: 1
category: "Jenkins Fundamentals"
difficulty: "beginner"
summary: "Edit a Jenkins freestyle job's config.xml to add a shell build step that installs a package, then validate the XML is well-formed."
estimatedMinutes: 25
order: 14

objectives:
  - "Understand the structure of a Jenkins freestyle job config.xml"
  - "Add a Shell build step that runs an apt-get install command"
  - "Validate the resulting XML with xmllint"

instructions: |
  ## Configure Jenkins Job for Package Installation

  Every Jenkins **freestyle job** is defined by a `config.xml` inside its job
  directory. The `<builders>` section lists the build steps that run in order.
  A **Shell** build step runs arbitrary bash commands inside the job's workspace.

  ### Job config.xml structure

  ```xml
  <?xml version='1.1' encoding='UTF-8'?>
  <project>
    <description>...</description>
    <builders>
      <hudson.tasks.Shell>
        <command>your shell command here</command>
      </hudson.tasks.Shell>
    </builders>
    <publishers/>
    <buildWrappers/>
  </project>
  ```

  ### Your tasks

  1. Replace the empty `<builders/>` tag in the job config with a Shell step that runs `apt-get install -y curl`
  2. Validate the XML with `xmllint` and save the result (`XML OK`) to `/root/xml-check.txt`

  ## Steps

  ### Step 1 — Inspect the existing job

  ```bash
  cat /var/lib/jenkins/jobs/install-packages/config.xml
  ```

  Notice `<builders/>` is self-closing — no build steps yet.

  ### Step 2 — Add the Shell build step

  Replace the empty tag with a full builders block:

  ```bash
  sed -i 's|<builders/>|<builders>\n  <hudson.tasks.Shell>\n    <command>apt-get install -y curl</command>\n  </hudson.tasks.Shell>\n</builders>|' \
    /var/lib/jenkins/jobs/install-packages/config.xml
  ```

  Confirm the change:

  ```bash
  grep -A4 builders /var/lib/jenkins/jobs/install-packages/config.xml
  ```

  ### Step 3 — Validate the XML

  Jenkins refuses to load a job with malformed XML. Check it first:

  ```bash
  xmllint --noout /var/lib/jenkins/jobs/install-packages/config.xml \
    && echo "XML OK" > /root/xml-check.txt \
    || echo "XML ERROR" > /root/xml-check.txt
  cat /root/xml-check.txt
  ```

tasks:
  - id: "add-shell-step"
    description: "Add a hudson.tasks.Shell build step with 'apt-get install -y curl' to the install-packages job config.xml"
  - id: "validate-xml"
    description: "Validate the config.xml with xmllint and save the result to /root/xml-check.txt"

image: "ubuntu:24.04"
shell: "bash"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /var/lib/jenkins/jobs/install-packages
  cat > /var/lib/jenkins/jobs/install-packages/config.xml << 'EOF'
  <?xml version='1.0' encoding='UTF-8'?>
  <project>
    <description>Job that installs system packages</description>
    <keepDependencies>false</keepDependencies>
    <builders/>
    <publishers/>
    <buildWrappers/>
  </project>
  EOF
  apt-get update -qq 2>/dev/null && apt-get install -y -qq libxml2-utils 2>/dev/null || true
  echo "Job config.xml created; xmllint available"

verifyScript: |
  CONFIG=/var/lib/jenkins/jobs/install-packages/config.xml

  # CHECK: add-shell-step
  if grep -q "hudson.tasks.Shell" "$CONFIG" \
     && grep -q "apt-get install" "$CONFIG"; then
    echo "CHECK:add-shell-step:PASS:Shell build step with apt-get install found in config.xml"
  else
    echo "CHECK:add-shell-step:FAIL:config.xml does not contain a hudson.tasks.Shell step with apt-get install"
  fi

  # CHECK: validate-xml
  if [ -f /root/xml-check.txt ] && grep -q "XML OK" /root/xml-check.txt; then
    echo "CHECK:validate-xml:PASS:/root/xml-check.txt confirms XML is valid"
  else
    echo "CHECK:validate-xml:FAIL:/root/xml-check.txt missing or does not contain 'XML OK' — XML may be malformed"
  fi

hints:
  - "Check the current file first: `cat /var/lib/jenkins/jobs/install-packages/config.xml` — find the exact `<builders/>` tag to replace."
  - "The sed command uses `|` as a delimiter to avoid clashing with the `/` characters in XML tags."
  - "If sed doesn't seem to work, verify the tag matches exactly — no extra spaces around `<builders/>`."
  - "xmllint is already installed — run `xmllint --noout config.xml && echo 'XML OK' > /root/xml-check.txt` directly."
