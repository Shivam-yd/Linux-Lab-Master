# ──────────────────────────────────────────────────────────────────────────────
# Jenkins Lab: Organize Jenkins Jobs with Folders (Level 1 - Foundation)
# ──────────────────────────────────────────────────────────────────────────────

id: "jenkins-job-folders"
title: "Organize Jenkins Jobs with Folders"
track: "jenkins"
level: 1
category: "Jenkins Fundamentals"
difficulty: "beginner"
summary: "Organise a cluttered Jenkins jobs directory by creating a Folder job, moving a flat job inside it, and verifying the resulting structure."
estimatedMinutes: 20
order: 13

objectives:
  - "Understand that Jenkins jobs are directories under JENKINS_HOME/jobs/"
  - "Create a Folder job using the correct config.xml project class"
  - "Nest an existing job inside a folder by moving its directory"

instructions: |
  ## Organize Jenkins Jobs with Folders

  **Scenario**
  Your Jenkins server has grown to dozens of flat jobs and the team can no longer find anything. The tech lead has asked you to introduce Folder organisation — specifically, to move all production-related jobs into a `production` folder so they're isolated from development jobs and easier to manage with folder-level permissions later.

  **Your task:** Create a `production` Folder job at `/var/lib/jenkins/jobs/production/config.xml` with the correct Folder class declaration, move the existing `test-job` into `production/jobs/`, and record the folder config path in `/root/folder-path.txt`.

  No text editor is installed — use shell redirection: `echo "..." >> file` or `cat > file <<'EOF' ... EOF`

  **What You'll Deliver**
  - `/var/lib/jenkins/jobs/production/config.xml` created with the `com.cloudbees.hudson.plugins.folder.Folder` class
  - `test-job` moved to `/var/lib/jenkins/jobs/production/jobs/test-job`
  - `/root/folder-path.txt` containing the string `/var/lib/jenkins/jobs/production/config.xml`

  ## Steps

  1. `mkdir -p /var/lib/jenkins/jobs/production/jobs`
  2. ```
     cat > /var/lib/jenkins/jobs/production/config.xml <<'EOF'
     <?xml version='1.1' encoding='UTF-8'?>
     <com.cloudbees.hudson.plugins.folder.Folder>
       <description>Production pipeline jobs</description>
       <views/>
       <viewsTabBar/>
     </com.cloudbees.hudson.plugins.folder.Folder>
     EOF
     ```
  3. `mv /var/lib/jenkins/jobs/test-job /var/lib/jenkins/jobs/production/jobs/test-job`
  4. `echo "/var/lib/jenkins/jobs/production/config.xml" > /root/folder-path.txt`
  5. `find /var/lib/jenkins/jobs -name config.xml`
  6. `cat /root/folder-path.txt`

tasks:
  - id: "create-folder"
    description: "Create /var/lib/jenkins/jobs/production/config.xml containing the Folder project class"
  - id: "move-job"
    description: "Move test-job into /var/lib/jenkins/jobs/production/jobs/"
  - id: "record-folder-path"
    description: "Write the string '/var/lib/jenkins/jobs/production/config.xml' to /root/folder-path.txt"

image: "ubuntu:24.04"
shell: "bash"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /var/lib/jenkins/jobs/test-job
  cat > /var/lib/jenkins/jobs/test-job/config.xml << 'EOF'
  <?xml version='1.1' encoding='UTF-8'?>
  <project>
    <description>A test pipeline job</description>
    <builders>
      <hudson.tasks.Shell>
        <command>echo hello</command>
      </hudson.tasks.Shell>
    </builders>
  </project>
  EOF
  mkdir -p /var/lib/jenkins/jobs/build-app
  touch /var/lib/jenkins/jobs/build-app/config.xml
  echo "Created flat jobs: test-job, build-app"

verifyScript: |
  # CHECK: create-folder
  if [ -f /var/lib/jenkins/jobs/production/config.xml ] \
     && grep -q "Folder" /var/lib/jenkins/jobs/production/config.xml; then
    echo "CHECK:create-folder:PASS:production/config.xml exists and contains Folder class declaration"
  else
    echo "CHECK:create-folder:FAIL:/var/lib/jenkins/jobs/production/config.xml missing or does not reference Folder"
  fi

  # CHECK: move-job
  if [ -d /var/lib/jenkins/jobs/production/jobs/test-job ] \
     && [ -f /var/lib/jenkins/jobs/production/jobs/test-job/config.xml ]; then
    echo "CHECK:move-job:PASS:test-job is correctly nested under production/jobs/"
  else
    echo "CHECK:move-job:FAIL:test-job not found at /var/lib/jenkins/jobs/production/jobs/test-job"
  fi

  # CHECK: record-folder-path
  if [ -f /root/folder-path.txt ] \
     && grep -q "/var/lib/jenkins/jobs/production/config.xml" /root/folder-path.txt; then
    echo "CHECK:record-folder-path:PASS:/root/folder-path.txt contains the correct folder config.xml path"
  else
    echo "CHECK:record-folder-path:FAIL:/root/folder-path.txt missing or contains wrong path"
  fi

hints:
  - "Create the folder's jobs sub-directory first: `mkdir -p /var/lib/jenkins/jobs/production/jobs`"
  - "The config.xml for a Folder must contain the string 'Folder' in the root XML element — copy the example from the Steps guide."
  - "`mv source destination` moves the entire directory — the destination is the new full path, not just the parent."
  - "Use `find /var/lib/jenkins/jobs -type f -name config.xml` to verify the structure before recording the path."
