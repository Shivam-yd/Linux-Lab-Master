setupScript: |
  apt-get install -y -qq libxml2-utils >/dev/null 2>&1 || true
  mkdir -p /var/lib/jenkins/jobs/nightly-tests
  cat > /var/lib/jenkins/jobs/nightly-tests/config.xml <<'EOF'
  <?xml version='1.1' encoding='UTF-8'?>
  <project>
    <description>Nightly integration test suite</description>
    <builders>
      <hudson.tasks.Shell>
        <command>echo "Running nightly integration tests"</command>
      </hudson.tasks.Shell>
    </builders>
    <publishers/>
  </project>
  EOF

verifyScript: |
  CONFIG=/var/lib/jenkins/jobs/nightly-tests/config.xml

  # CHECK: triggers_block_present
  if grep -q "<triggers>" "$CONFIG" 2>/dev/null; then
    echo "CHECK:triggers_block_present:PASS:<triggers> block found in config.xml"
  else
    echo "CHECK:triggers_block_present:FAIL:No <triggers> block in config.xml — add it between <description> and <builders>"
  fi

  # CHECK: timer_trigger_configured
  if grep -q "TimerTrigger" "$CONFIG" 2>/dev/null && grep -A2 "TimerTrigger" "$CONFIG" | grep -q "2"; then
    echo "CHECK:timer_trigger_configured:PASS:TimerTrigger found with an hour-2 cron spec"
  else
    echo "CHECK:timer_trigger_configured:FAIL:TimerTrigger missing or its <spec> does not include hour 2 — use 'H 2 * * *'"
  fi

  # CHECK: scm_trigger_configured
  if grep -q "SCMTrigger" "$CONFIG" 2>/dev/null && grep -A2 "SCMTrigger" "$CONFIG" | grep -q "H/5"; then
    echo "CHECK:scm_trigger_configured:PASS:SCMTrigger found with H/5 poll schedule"
  else
    echo "CHECK:scm_trigger_configured:FAIL:SCMTrigger missing or its <spec> does not contain 'H/5' — use 'H/5 * * * *'"
  fi

hints:
  - "Triggers go inside a <triggers> element at the top level of <project>."
  - "TimerTrigger uses Jenkins' H-syntax: 'H 2 * * *' means 'once a day, somewhere in the 2 AM hour'."
  - "SCMTrigger polls for changes: 'H/5 * * * *' means every 5 minutes, offset by a hash of the job name."
  - "Validate XML with: xmllint --noout config.xml — any error here means the XML won't load in Jenkins."
