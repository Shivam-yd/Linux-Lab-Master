    if grep -qF "$spec_in_file" "$CONFIG" 2>/dev/null; then
      echo "CHECK:record-schedule:PASS:schedule.txt matches the spec in config.xml"
    else
      echo "CHECK:record-schedule:FAIL:schedule.txt content does not match the <spec> added to config.xml"
