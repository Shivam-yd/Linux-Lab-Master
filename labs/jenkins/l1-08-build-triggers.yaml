instructions: |
  ## Build Triggers: Timer and SCM Polling

  **Scenario**
  Your nightly integration tests run manually right now — someone on the team
  has to remember to kick them off every night. On three separate occasions
  this month, the tests weren't run at all. Your manager wants two things: an
  automatic nightly run at 2 AM, and a second trigger that fires whenever a
  developer pushes to the repository (by polling every 5 minutes). Both are
  configured in the same `<triggers>` block in the job's `config.xml`.

  **Your task:** add a `TimerTrigger` (2 AM daily) and an `SCMTrigger` (every
  5 minutes) to the `nightly-tests` job's `config.xml`.

  No text editor is installed — use shell redirection: `cat > file <<'EOF' ... EOF`

  **What You'll Deliver**
  - `<triggers>` block present in the nightly-tests job config
  - `TimerTrigger` configured with cron spec `H 2 * * *`
  - `SCMTrigger` configured with poll spec `H/5 * * * *`

  ## Steps

  1. Inspect the existing config: `cat /var/lib/jenkins/jobs/nightly-tests/config.xml`
  2. Rewrite with triggers:
     ```
     cat > /var/lib/jenkins/jobs/nightly-tests/config.xml <<'EOF'
     <?xml version='1.1' encoding='UTF-8'?>
     <project>
       <description>Nightly integration test suite</description>
       <triggers>
         <hudson.triggers.TimerTrigger>
           <spec>H 2 * * *</spec>
         </hudson.triggers.TimerTrigger>
         <hudson.triggers.SCMTrigger>
           <spec>H/5 * * * *</spec>
         </hudson.triggers.SCMTrigger>
       </triggers>
       <builders>
         <hudson.tasks.Shell>
           <command>echo "Running nightly integration tests"</command>
         </hudson.tasks.Shell>
       </builders>
     </project>
     EOF
     ```
  3. Validate the XML: `xmllint --noout /var/lib/jenkins/jobs/nightly-tests/config.xml && echo "XML OK"`
  4. Confirm both triggers are present:
     `grep -E "TimerTrigger|SCMTrigger" /var/lib/jenkins/jobs/nightly-tests/config.xml`

