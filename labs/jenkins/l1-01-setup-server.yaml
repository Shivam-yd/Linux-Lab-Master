# ──────────────────────────────────────────────────────────────────────────────
# Jenkins Lab: Set Up Jenkins Server (Level 1 - Foundation)
# ──────────────────────────────────────────────────────────────────────────────

id: "jenkins-setup-server"
title: "Set Up Jenkins Server"
track: "jenkins"
level: 1
category: "Jenkins Fundamentals"
difficulty: "beginner"
summary: "Prepare a system to run Jenkins by setting JENKINS_HOME, creating its directory structure, and writing a launch script."
estimatedMinutes: 20
order: 10

objectives:
  - "Understand what JENKINS_HOME is and why it matters"
  - "Create the standard Jenkins home directory layout"
  - "Write a launch script that starts Jenkins with the correct environment"

instructions: |
  ## Set Up Jenkins Server

  **Scenario**
  Your team is onboarding a new build server and Jenkins needs to be ready before tomorrow's release cycle begins. The senior engineer has handed you a bare Ubuntu box with the Jenkins WAR already placed at `/opt/jenkins/jenkins.war`. Jenkins won't start correctly without a defined home directory and a consistent launch script — that's your job to sort out before the morning stand-up.

  **Your task:** Configure the server by adding `JENKINS_HOME=/var/lib/jenkins` to `/etc/environment`, creating the five standard sub-directories inside that path, and writing an executable launch script at `/usr/local/bin/start-jenkins.sh`.

  No text editor is installed — use shell redirection: `echo "..." >> file` or `cat > file <<'EOF' ... EOF`

  **What You'll Deliver**
  - `JENKINS_HOME=/var/lib/jenkins` persisted in `/etc/environment`
  - Five standard sub-directories (`jobs`, `plugins`, `workspace`, `logs`, `secrets`) created under `/var/lib/jenkins`
  - `/usr/local/bin/start-jenkins.sh` created, executable, referencing `JENKINS_HOME`, `jenkins.war`, and port `8080`

  ## Steps

  1. `echo 'JENKINS_HOME=/var/lib/jenkins' >> /etc/environment`
  2. `export JENKINS_HOME=/var/lib/jenkins`
  3. `mkdir -p /var/lib/jenkins/{jobs,plugins,workspace,logs,secrets}`
  4. ```
     cat > /usr/local/bin/start-jenkins.sh <<'EOF'
     #!/bin/bash
     export JENKINS_HOME=/var/lib/jenkins
     exec java -jar /opt/jenkins/jenkins.war \
       --httpPort=8080 \
       --logfile=$JENKINS_HOME/logs/jenkins.log
     EOF
     ```
  5. `chmod +x /usr/local/bin/start-jenkins.sh`
  6. `grep JENKINS_HOME /etc/environment && ls /var/lib/jenkins/`

tasks:
  - id: "set-jenkins-home"
    description: "Add JENKINS_HOME=/var/lib/jenkins to /etc/environment"
  - id: "create-dir-structure"
    description: "Create jobs, plugins, workspace, logs, and secrets directories under /var/lib/jenkins"
  - id: "write-launch-script"
    description: "Create /usr/local/bin/start-jenkins.sh — executable, references JENKINS_HOME, port 8080, and jenkins.war"

image: "ubuntu:24.04"
shell: "bash"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root"

setupScript: |
  mkdir -p /opt/jenkins
  touch /opt/jenkins/jenkins.war
  echo "Jenkins WAR placeholder created at /opt/jenkins/jenkins.war"

verifyScript: |
  # CHECK: set-jenkins-home
  if grep -q "JENKINS_HOME=/var/lib/jenkins" /etc/environment; then
    echo "CHECK:set-jenkins-home:PASS:JENKINS_HOME correctly set in /etc/environment"
  else
    echo "CHECK:set-jenkins-home:FAIL:/etc/environment does not contain JENKINS_HOME=/var/lib/jenkins"
  fi

  # CHECK: create-dir-structure
  missing=""
  for d in jobs plugins workspace logs secrets; do
    [ -d "/var/lib/jenkins/$d" ] || missing="$missing $d"
  done
  if [ -z "$missing" ]; then
    echo "CHECK:create-dir-structure:PASS:All required directories exist under /var/lib/jenkins"
  else
    echo "CHECK:create-dir-structure:FAIL:Missing directories under /var/lib/jenkins:$missing"
  fi

  # CHECK: write-launch-script
  if [ -x /usr/local/bin/start-jenkins.sh ] \
     && grep -q "JENKINS_HOME" /usr/local/bin/start-jenkins.sh \
     && grep -q "8080"         /usr/local/bin/start-jenkins.sh \
     && grep -q "jenkins.war"  /usr/local/bin/start-jenkins.sh; then
    echo "CHECK:write-launch-script:PASS:start-jenkins.sh is executable and contains JENKINS_HOME, port 8080, and jenkins.war"
  else
    echo "CHECK:write-launch-script:FAIL:start-jenkins.sh missing, not executable, or does not reference JENKINS_HOME / 8080 / jenkins.war"
  fi

hints:
  - "Use `echo 'JENKINS_HOME=/var/lib/jenkins' >> /etc/environment` — one `>` would overwrite the whole file!"
  - "Brace expansion lets you create all five directories in one command: `mkdir -p /var/lib/jenkins/{jobs,plugins,workspace,logs,secrets}`"
  - "Write the script with a heredoc (`cat > /path << 'EOF' ... EOF`), then make it executable with `chmod +x`."
  - "After writing, verify: `grep JENKINS_HOME /usr/local/bin/start-jenkins.sh && grep 8080 /usr/local/bin/start-jenkins.sh`"
