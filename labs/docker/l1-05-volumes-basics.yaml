# ──────────────────────────────────────────────────────────────────────────────
# Docker Lab: Persisting Data with Volumes
# ──────────────────────────────────────────────────────────────────────────────

id: "docker-volumes-basics"
title: "Persisting Data with Volumes"
track: "docker"
level: 1
category: "Docker Fundamentals"
difficulty: "beginner"
summary: "Create a named volume, write data to it from one container, and read it back from a completely different container."
estimatedMinutes: 15
order: 500

objectives:
  - "Create a named volume with docker volume create"
  - "Mount a volume into a container with docker run -v"
  - "Prove data written to a volume survives container removal and recreation"

instructions: |
  ## Containers are disposable. Volumes are not.

  A container's own filesystem disappears when you `docker rm` it. A
  **volume** is separate, durable storage that you mount into a container —
  data written there survives even after the container that wrote it is gone.

  ```sh
  docker volume create <name>            # create a named volume
  docker run -v <volume>:<path> <image> <cmd>  # mount the volume at <path>
  ```

  ### What to do

  1. Create a volume named `appdata`.
  2. Run a container named `writer` from `busybox`, mounting `appdata` at
     `/data`, that writes `written-by-writer` into `/data/note.txt`:
     `docker run --name writer -v appdata:/data busybox sh -c "echo written-by-writer > /data/note.txt"`
  3. Remove `writer`: `docker rm writer`.
  4. Run a **different** container named `reader`, mounting the **same**
     volume, that appends `read-by-reader` to `/data/note.txt`:
     `docker run --name reader -v appdata:/data busybox sh -c "echo read-by-reader >> /data/note.txt"`
  5. Remove `reader` too. The volume — and its data — should still exist.

tasks:
  - id: "volume_created"
    description: "A volume named appdata exists (docker volume create appdata)"
  - id: "written_by_writer"
    description: "A writer container wrote 'written-by-writer' into /data/note.txt on the appdata volume, then was removed"
  - id: "read_by_reader"
    description: "A separate reader container, using the same appdata volume, appended 'read-by-reader' to note.txt, then was removed"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/work"

setupScript: |
  mkdir -p /usr/local/bin /var/lib/fakedocker/images /var/lib/fakedocker/containers /var/lib/fakedocker/volumes /root/work
  cat > /usr/local/bin/docker <<'DOCKEREOF'
  #!/bin/sh
  # Minimal educational Docker CLI simulator.
  # This sandbox has no privileged/nested-container support, so real dockerd
  # cannot run here. This script implements the real subset of `docker`
  # commands/output format needed to teach the concept: it really spawns and
  # kills processes for containers, really writes/reads log files, and really
  # persists data through symlinked volume directories.
  ROOT=/var/lib/fakedocker
  IMAGES="$ROOT/images"
  CONTAINERS="$ROOT/containers"
  VOLUMES="$ROOT/volumes"
  mkdir -p "$IMAGES" "$CONTAINERS" "$VOLUMES"
  
  image_size() {
    case "$1" in
      busybox) echo 4 ;;
      alpine) echo 7 ;;
      nginx) echo 142 ;;
      ubuntu) echo 78 ;;
      *) echo 10 ;;
    esac
  }
  
  fake_id() {
    n="$1-$$-$RANDOM_SEED"
    echo "$n" | cksum | cut -d' ' -f1 | cut -c1-12
  }
  RANDOM_SEED=0
  
  norm_image() {
    # Ensure IMAGE has a :TAG, defaulting to :latest
    case "$1" in
      *:*) echo "$1" ;;
      *) echo "$1:latest" ;;
    esac
  }
  
  ensure_image() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      repo=${img%%:*}
      mkdir -p "$dir"
      fake_id "$img" > "$dir/id"
      image_size "$repo" > "$dir/size"
      echo "base" > "$dir/kind"
    fi
    echo "$dir"
  }
  
  cmd_pull() {
    img=$(norm_image "$1")
    echo "$img: Pulling from library/${img%%:*}"
    echo "Digest: sha256:$(fake_id "$img")0000000000000000000000000000000000000000000000"
    ensure_image "$img" >/dev/null
    echo "$img" >> "$ROOT/pull_history.log"
    echo "Status: Downloaded newer image for $img"
  }
  
  cmd_images() {
    printf "%-20s %-10s %-15s %s\n" "REPOSITORY" "TAG" "IMAGE ID" "SIZE"
    for d in "$IMAGES"/*/; do
      [ -d "$d" ] || continue
      name=$(basename "$d")
      repo=${name%%:*}
      tag=${name#*:}
      id=$(cat "$d/id" 2>/dev/null || echo "unknown")
      size=$(cat "$d/size" 2>/dev/null || echo "0")
      printf "%-20s %-10s %-15s %sMB\n" "$repo" "$tag" "$id" "$size"
    done
  }
  
  cmd_rmi() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      echo "Error: No such image: $img" >&2
      exit 1
    fi
    # Refuse if a container (running or stopped) still references this image, like real docker.
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      if [ "$(cat "$c/image" 2>/dev/null)" = "$img" ]; then
        echo "Error response from daemon: conflict: unable to remove repository reference \"$img\" (must force) - container $(basename "$c") is using its referenced image" >&2
        exit 1
      fi
    done
    rm -rf "$dir"
    echo "Untagged: $img"
    echo "Deleted: sha256:$(fake_id "$img")"
  }
  
  cmd_inspect() {
    target="$1"
    img="$IMAGES/$(norm_image "$target")"
    if [ -d "$img" ]; then
      echo "{"
      echo "  \"Type\": \"image\","
      echo "  \"RepoTags\": [\"$(norm_image "$target")\"],"
      echo "  \"Id\": \"sha256:$(cat "$img/id")\","
      echo "  \"Size\": $(cat "$img/size")000000"
      echo "}"
      return 0
    fi
    c="$CONTAINERS/$target"
    if [ -d "$c" ]; then
      echo "{"
      echo "  \"Type\": \"container\","
      echo "  \"Name\": \"/$target\","
      echo "  \"Image\": \"$(cat "$c/image")\","
      echo "  \"State\": { \"Status\": \"$(cat "$c/status")\" }"
      echo "}"
      return 0
    fi
    echo "Error: No such object: $target" >&2
    exit 1
  }
  
  cmd_run() {
    DETACH=0
    NAME=""
    VOL_SPEC=""
    while [ $# -gt 0 ]; do
      case "$1" in
        -d|--detach) DETACH=1; shift ;;
        --name) NAME="$2"; shift 2 ;;
        -v) VOL_SPEC="$2"; shift 2 ;;
        *) break ;;
      esac
    done
    IMAGE="$1"
    if [ -z "$IMAGE" ]; then
      echo "docker: run requires an image name" >&2
      exit 1
    fi
    shift
    # Remaining "$@" is the exact command argv to run inside the container --
    # kept as a real array (not flattened to a string) so quoting like
    # `sh -c "echo x > file"` survives intact.
  
    img=$(norm_image "$IMAGE")
    ensure_image "$img" >/dev/null
  
    if [ -z "$NAME" ]; then
      NAME="container_$(fake_id "$img")"
    fi
    cdir="$CONTAINERS/$NAME"
    if [ -d "$cdir" ] && [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: Conflict. The container name \"/$NAME\" is already in use" >&2
      exit 1
    fi
    rm -rf "$cdir"
    mkdir -p "$cdir"
    echo "$img" > "$cdir/image"
    cid=$(fake_id "$NAME")
    echo "$cid" > "$cdir/id"
    : > "$cdir/log"
  
    if [ -n "$VOL_SPEC" ]; then
      volname=${VOL_SPEC%%:*}
      mountpath=${VOL_SPEC#*:}
      mkdir -p "$VOLUMES/$volname"
      rm -rf "$mountpath"
      mkdir -p "$(dirname "$mountpath")"
      ln -sfn "$VOLUMES/$volname" "$mountpath"
      echo "$VOL_SPEC" > "$cdir/volume"
    fi
  
    if [ "$DETACH" = "1" ]; then
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      else
        sh -c 'while true; do sleep 3600; done' >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      fi
      echo "$cid"
    else
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" 2>&1 | tee "$cdir/log"
      fi
      echo "exited" > "$cdir/status"
    fi
  }
  
  cmd_ps() {
    show_all=0
    [ "$1" = "-a" ] && show_all=1
    printf "%-14s %-20s %-10s %s\n" "CONTAINER ID" "IMAGE" "STATUS" "NAMES"
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      name=$(basename "$c")
      status=$(cat "$c/status" 2>/dev/null || echo "unknown")
      if [ "$status" != "running" ] && [ "$show_all" != "1" ]; then
        continue
      fi
      id=$(cat "$c/id" 2>/dev/null || echo "??")
      img=$(cat "$c/image" 2>/dev/null || echo "??")
      printf "%-14s %-20s %-10s %s\n" "$id" "$img" "$status" "$name"
    done
  }
  
  cmd_stop() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ -f "$cdir/pid" ]; then
      pid=$(cat "$cdir/pid")
      kill "$pid" 2>/dev/null
      # also kill any child sh -c process tree started under it
      pkill -P "$pid" 2>/dev/null
    fi
    echo "exited" > "$cdir/status"
    echo "$name"
  }
  
  cmd_rm() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: You cannot remove a running container $name. Stop it first." >&2
      exit 1
    fi
    rm -rf "$cdir"
    echo "$name"
  }
  
  cmd_logs() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    cat "$cdir/log" 2>/dev/null
  }
  
  cmd_exec() {
    name="$1"; shift
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ] || [ "$(cat "$cdir/status" 2>/dev/null)" != "running" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    sh -c "$*"
  }
  
  cmd_build() {
    tag=""
    ctx="."
    while [ $# -gt 0 ]; do
      case "$1" in
        -t) tag="$2"; shift 2 ;;
        *) ctx="$1"; shift ;;
      esac
    done
    dockerfile="$ctx/Dockerfile"
    if [ ! -f "$dockerfile" ]; then
      echo "unable to prepare context: unable to evaluate symlinks in Dockerfile path: Dockerfile: no such file or directory" >&2
      exit 1
    fi
    if ! grep -qE '^FROM[[:space:]]+' "$dockerfile"; then
      echo "Error: Dockerfile is missing a FROM instruction" >&2
      exit 1
    fi
    base=$(grep -E '^FROM[[:space:]]+' "$dockerfile" | head -1 | awk '{print $2}')
    steps=$(grep -cE '^(RUN|COPY|ADD|CMD|ENTRYPOINT|ENV|EXPOSE|WORKDIR|LABEL)[[:space:]]' "$dockerfile")
    if [ -z "$tag" ]; then
      echo "docker: build requires -t NAME:TAG" >&2
      exit 1
    fi
    img=$(norm_image "$tag")
    n=1
    total=$((steps + 1))
    echo "Sending build context to Docker daemon"
    echo "Step 1/$total : FROM $base"
    i=1
    while IFS= read -r line; do
      case "$line" in
        FROM*) continue ;;
        "") continue ;;
        \#*) continue ;;
      esac
      i=$((i + 1))
      echo "Step $i/$total : $line"
    done < "$dockerfile"
    dir=$(ensure_image "$img")
    echo "custom" > "$dir/kind"
    echo "$base" > "$dir/base"
    cp "$dockerfile" "$dir/Dockerfile"
    echo "Successfully built $(fake_id "$img")"
    echo "Successfully tagged $img"
  }
  
  cmd_volume() {
    sub="$1"; shift
    case "$sub" in
      create)
        name="$1"
        mkdir -p "$VOLUMES/$name"
        echo "$name"
        ;;
      ls)
        printf "%-20s %s\n" "DRIVER" "VOLUME NAME"
        for d in "$VOLUMES"/*/; do
          [ -d "$d" ] || continue
          printf "%-20s %s\n" "local" "$(basename "$d")"
        done
        ;;
      rm)
        rm -rf "${VOLUMES:?}/$1"
        echo "$1"
        ;;
      *)
        echo "docker volume: unknown subcommand $sub" >&2
        exit 1
        ;;
    esac
  }
  
  case "$1" in
    pull) shift; cmd_pull "$@" ;;
    images) shift; cmd_images "$@" ;;
    rmi) shift; cmd_rmi "$@" ;;
    inspect) shift; cmd_inspect "$@" ;;
    run) shift; cmd_run "$@" ;;
    ps) shift; cmd_ps "$@" ;;
    stop) shift; cmd_stop "$@" ;;
    rm) shift; cmd_rm "$@" ;;
    logs) shift; cmd_logs "$@" ;;
    exec) shift; cmd_exec "$@" ;;
    build) shift; cmd_build "$@" ;;
    volume) shift; cmd_volume "$@" ;;
    version) echo "Docker version 24.0.0 (lab-sandbox)" ;;
    *)
      echo "docker: unknown command '$1'" >&2
      exit 1
      ;;
  esac
  DOCKEREOF
  chmod +x /usr/local/bin/docker

verifyScript: |
  VOLUMES=/var/lib/fakedocker/volumes
  CONTAINERS=/var/lib/fakedocker/containers
  NOTE="$VOLUMES/appdata/note.txt"

  # CHECK: volume_created
  if [ -d "$VOLUMES/appdata" ]; then
    echo "CHECK:volume_created:PASS:appdata volume exists"
  else
    echo "CHECK:volume_created:FAIL:Run docker volume create appdata"
  fi

  # CHECK: written_by_writer
  if [ -f "$NOTE" ] && grep -q "written-by-writer" "$NOTE" && [ ! -d "$CONTAINERS/writer" ]; then
    echo "CHECK:written_by_writer:PASS:writer wrote to the volume and was removed"
  else
    echo "CHECK:written_by_writer:FAIL:Run the writer container (mounting -v appdata:/data), then docker rm writer"
  fi

  # CHECK: read_by_reader
  if [ -f "$NOTE" ] && grep -q "written-by-writer" "$NOTE" && grep -q "read-by-reader" "$NOTE" && [ ! -d "$CONTAINERS/reader" ]; then
    echo "CHECK:read_by_reader:PASS:reader saw the writer's data and appended its own, proving the volume persisted"
  else
    echo "CHECK:read_by_reader:FAIL:Run the reader container (same -v appdata:/data), append 'read-by-reader', then docker rm reader"
  fi

hints:
  - "docker volume create <name> makes storage that outlives any single container."
  - "-v appdata:/data mounts the volume at /data inside the container's filesystem."
  - "Remove writer before starting reader so you can see the data really came from the volume, not the old container."
  - "docker run --name reader -v appdata:/data busybox sh -c \"echo read-by-reader >> /data/note.txt\""
