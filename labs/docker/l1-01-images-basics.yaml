# ──────────────────────────────────────────────────────────────────────────────
# Docker Lab: Images 101 — Pull, List, Inspect, Remove
# ──────────────────────────────────────────────────────────────────────────────

id: "docker-images-basics"
title: "Docker Images 101: Pull, List, Inspect, Remove"
track: "docker"
level: 1
category: "Docker Fundamentals"
difficulty: "beginner"
summary: "Learn what a Docker image is and manage the local image cache with pull, images, inspect, and rmi."
estimatedMinutes: 15
order: 100

objectives:
  - "Explain the difference between an image and a container"
  - "Download images into the local cache with docker pull"
  - "List cached images with docker images"
  - "Remove an image you no longer need with docker rmi"

instructions: |
  ## Images: the blueprint for a container

  A **Docker image** is a read-only template — application code, a runtime,
  libraries, and config baked into layers. A **container** is a running
  instance created *from* an image. You can start many containers from the
  same image; none of them change the image itself.

  Every image lives in a local cache once you `pull` it, identified by a
  `repository:tag` pair (e.g. `nginx:latest`) and a short image ID.

  ### Commands you'll use

  ```sh
  docker pull <image>       # download an image into the local cache
  docker images             # list cached images
  docker inspect <image>    # show an image's metadata (ID, size, tags)
  docker rmi <image>        # remove an image from the cache
  ```

  ### What to do

  1. Pull the `busybox` image.
  2. Pull the `nginx` image.
  3. Run `docker images` and `docker inspect nginx` to see what's cached.
  4. You decide you don't need `busybox` anymore — remove it with `docker rmi busybox`.
  5. Confirm with `docker images` that only `nginx` remains.

  > Note: this sandbox has no internet access, so `docker` here is a local
  > teaching CLI that behaves like the real thing for pull/images/inspect/rmi,
  > backed by a small local image cache instead of a real registry.

tasks:
  - id: "pulled_busybox"
    description: "Pull the busybox image with docker pull"
  - id: "pulled_nginx"
    description: "Pull the nginx image so it appears in docker images"
  - id: "removed_busybox"
    description: "Remove the busybox image with docker rmi, leaving nginx in the cache"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/work"

setupScript: |
  mkdir -p /usr/local/bin /var/lib/fakedocker/images /var/lib/fakedocker/containers /var/lib/fakedocker/volumes /root/work
  cat > /usr/local/bin/docker <<'DOCKEREOF'
  #!/bin/sh
  # Minimal educational Docker CLI simulator.
  # This sandbox has no privileged/nested-container support, so real dockerd
  # cannot run here. This script implements the real subset of `docker`
  # commands/output format needed to teach the concept: it really spawns and
  # kills processes for containers, really writes/reads log files, and really
  # persists data through symlinked volume directories.
  ROOT=/var/lib/fakedocker
  IMAGES="$ROOT/images"
  CONTAINERS="$ROOT/containers"
  VOLUMES="$ROOT/volumes"
  mkdir -p "$IMAGES" "$CONTAINERS" "$VOLUMES"
  
  image_size() {
    case "$1" in
      busybox) echo 4 ;;
      alpine) echo 7 ;;
      nginx) echo 142 ;;
      ubuntu) echo 78 ;;
      *) echo 10 ;;
    esac
  }
  
  fake_id() {
    n="$1-$$-$RANDOM_SEED"
    echo "$n" | cksum | cut -d' ' -f1 | cut -c1-12
  }
  RANDOM_SEED=0
  
  norm_image() {
    # Ensure IMAGE has a :TAG, defaulting to :latest
    case "$1" in
      *:*) echo "$1" ;;
      *) echo "$1:latest" ;;
    esac
  }
  
  ensure_image() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      repo=${img%%:*}
      mkdir -p "$dir"
      fake_id "$img" > "$dir/id"
      image_size "$repo" > "$dir/size"
      echo "base" > "$dir/kind"
    fi
    echo "$dir"
  }
  
  cmd_pull() {
    img=$(norm_image "$1")
    echo "$img: Pulling from library/${img%%:*}"
    echo "Digest: sha256:$(fake_id "$img")0000000000000000000000000000000000000000000000"
    ensure_image "$img" >/dev/null
    echo "$img" >> "$ROOT/pull_history.log"
    echo "Status: Downloaded newer image for $img"
  }
  
  cmd_images() {
    printf "%-20s %-10s %-15s %s\n" "REPOSITORY" "TAG" "IMAGE ID" "SIZE"
    for d in "$IMAGES"/*/; do
      [ -d "$d" ] || continue
      name=$(basename "$d")
      repo=${name%%:*}
      tag=${name#*:}
      id=$(cat "$d/id" 2>/dev/null || echo "unknown")
      size=$(cat "$d/size" 2>/dev/null || echo "0")
      printf "%-20s %-10s %-15s %sMB\n" "$repo" "$tag" "$id" "$size"
    done
  }
  
  cmd_rmi() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      echo "Error: No such image: $img" >&2
      exit 1
    fi
    # Refuse if a container (running or stopped) still references this image, like real docker.
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      if [ "$(cat "$c/image" 2>/dev/null)" = "$img" ]; then
        echo "Error response from daemon: conflict: unable to remove repository reference \"$img\" (must force) - container $(basename "$c") is using its referenced image" >&2
        exit 1
      fi
    done
    rm -rf "$dir"
    echo "Untagged: $img"
    echo "Deleted: sha256:$(fake_id "$img")"
  }
  
  cmd_inspect() {
    target="$1"
    img="$IMAGES/$(norm_image "$target")"
    if [ -d "$img" ]; then
      echo "{"
      echo "  \"Type\": \"image\","
      echo "  \"RepoTags\": [\"$(norm_image "$target")\"],"
      echo "  \"Id\": \"sha256:$(cat "$img/id")\","
      echo "  \"Size\": $(cat "$img/size")000000"
      echo "}"
      return 0
    fi
    c="$CONTAINERS/$target"
    if [ -d "$c" ]; then
      echo "{"
      echo "  \"Type\": \"container\","
      echo "  \"Name\": \"/$target\","
      echo "  \"Image\": \"$(cat "$c/image")\","
      echo "  \"State\": { \"Status\": \"$(cat "$c/status")\" }"
      echo "}"
      return 0
    fi
    echo "Error: No such object: $target" >&2
    exit 1
  }
  
  cmd_run() {
    DETACH=0
    NAME=""
    VOL_SPEC=""
    while [ $# -gt 0 ]; do
      case "$1" in
        -d|--detach) DETACH=1; shift ;;
        --name) NAME="$2"; shift 2 ;;
        -v) VOL_SPEC="$2"; shift 2 ;;
        *) break ;;
      esac
    done
    IMAGE="$1"
    if [ -z "$IMAGE" ]; then
      echo "docker: run requires an image name" >&2
      exit 1
    fi
    shift
    # Remaining "$@" is the exact command argv to run inside the container --
    # kept as a real array (not flattened to a string) so quoting like
    # `sh -c "echo x > file"` survives intact.
  
    img=$(norm_image "$IMAGE")
    ensure_image "$img" >/dev/null
  
    if [ -z "$NAME" ]; then
      NAME="container_$(fake_id "$img")"
    fi
    cdir="$CONTAINERS/$NAME"
    if [ -d "$cdir" ] && [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: Conflict. The container name \"/$NAME\" is already in use" >&2
      exit 1
    fi
    rm -rf "$cdir"
    mkdir -p "$cdir"
    echo "$img" > "$cdir/image"
    cid=$(fake_id "$NAME")
    echo "$cid" > "$cdir/id"
    : > "$cdir/log"
  
    if [ -n "$VOL_SPEC" ]; then
      volname=${VOL_SPEC%%:*}
      mountpath=${VOL_SPEC#*:}
      mkdir -p "$VOLUMES/$volname"
      rm -rf "$mountpath"
      mkdir -p "$(dirname "$mountpath")"
      ln -sfn "$VOLUMES/$volname" "$mountpath"
      echo "$VOL_SPEC" > "$cdir/volume"
    fi
  
    if [ "$DETACH" = "1" ]; then
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      else
        sh -c 'while true; do sleep 3600; done' >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      fi
      echo "$cid"
    else
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" 2>&1 | tee "$cdir/log"
      fi
      echo "exited" > "$cdir/status"
    fi
  }
  
  cmd_ps() {
    show_all=0
    [ "$1" = "-a" ] && show_all=1
    printf "%-14s %-20s %-10s %s\n" "CONTAINER ID" "IMAGE" "STATUS" "NAMES"
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      name=$(basename "$c")
      status=$(cat "$c/status" 2>/dev/null || echo "unknown")
      if [ "$status" != "running" ] && [ "$show_all" != "1" ]; then
        continue
      fi
      id=$(cat "$c/id" 2>/dev/null || echo "??")
      img=$(cat "$c/image" 2>/dev/null || echo "??")
      printf "%-14s %-20s %-10s %s\n" "$id" "$img" "$status" "$name"
    done
  }
  
  cmd_stop() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ -f "$cdir/pid" ]; then
      pid=$(cat "$cdir/pid")
      kill "$pid" 2>/dev/null
      # also kill any child sh -c process tree started under it
      pkill -P "$pid" 2>/dev/null
    fi
    echo "exited" > "$cdir/status"
    echo "$name"
  }
  
  cmd_rm() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: You cannot remove a running container $name. Stop it first." >&2
      exit 1
    fi
    rm -rf "$cdir"
    echo "$name"
  }
  
  cmd_logs() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    cat "$cdir/log" 2>/dev/null
  }
  
  cmd_exec() {
    name="$1"; shift
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ] || [ "$(cat "$cdir/status" 2>/dev/null)" != "running" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    "$@"
  }
  
  cmd_build() {
    tag=""
    ctx="."
    while [ $# -gt 0 ]; do
      case "$1" in
        -t) tag="$2"; shift 2 ;;
        *) ctx="$1"; shift ;;
      esac
    done
    dockerfile="$ctx/Dockerfile"
    if [ ! -f "$dockerfile" ]; then
      echo "unable to prepare context: unable to evaluate symlinks in Dockerfile path: Dockerfile: no such file or directory" >&2
      exit 1
    fi
    if ! grep -qE '^FROM[[:space:]]+' "$dockerfile"; then
      echo "Error: Dockerfile is missing a FROM instruction" >&2
      exit 1
    fi
    base=$(grep -E '^FROM[[:space:]]+' "$dockerfile" | head -1 | awk '{print $2}')
    steps=$(grep -cE '^(RUN|COPY|ADD|CMD|ENTRYPOINT|ENV|EXPOSE|WORKDIR|LABEL)[[:space:]]' "$dockerfile")
    if [ -z "$tag" ]; then
      echo "docker: build requires -t NAME:TAG" >&2
      exit 1
    fi
    img=$(norm_image "$tag")
    n=1
    total=$((steps + 1))
    echo "Sending build context to Docker daemon"
    echo "Step 1/$total : FROM $base"
    i=1
    while IFS= read -r line; do
      case "$line" in
        FROM*) continue ;;
        "") continue ;;
        \#*) continue ;;
      esac
      i=$((i + 1))
      echo "Step $i/$total : $line"
    done < "$dockerfile"
    dir=$(ensure_image "$img")
    echo "custom" > "$dir/kind"
    echo "$base" > "$dir/base"
    cp "$dockerfile" "$dir/Dockerfile"
    echo "Successfully built $(fake_id "$img")"
    echo "Successfully tagged $img"
  }
  
  cmd_volume() {
    sub="$1"; shift
    case "$sub" in
      create)
        name="$1"
        mkdir -p "$VOLUMES/$name"
        echo "$name"
        ;;
      ls)
        printf "%-20s %s\n" "DRIVER" "VOLUME NAME"
        for d in "$VOLUMES"/*/; do
          [ -d "$d" ] || continue
          printf "%-20s %s\n" "local" "$(basename "$d")"
        done
        ;;
      rm)
        rm -rf "${VOLUMES:?}/$1"
        echo "$1"
        ;;
      *)
        echo "docker volume: unknown subcommand $sub" >&2
        exit 1
        ;;
    esac
  }
  
  case "$1" in
    pull) shift; cmd_pull "$@" ;;
    images) shift; cmd_images "$@" ;;
    rmi) shift; cmd_rmi "$@" ;;
    inspect) shift; cmd_inspect "$@" ;;
    run) shift; cmd_run "$@" ;;
    ps) shift; cmd_ps "$@" ;;
    stop) shift; cmd_stop "$@" ;;
    rm) shift; cmd_rm "$@" ;;
    logs) shift; cmd_logs "$@" ;;
    exec) shift; cmd_exec "$@" ;;
    build) shift; cmd_build "$@" ;;
    volume) shift; cmd_volume "$@" ;;
    version) echo "Docker version 24.0.0 (lab-sandbox)" ;;
    *)
      echo "docker: unknown command '$1'" >&2
      exit 1
      ;;
  esac
  DOCKEREOF
  chmod +x /usr/local/bin/docker

verifyScript: |
  IMAGES=/var/lib/fakedocker/images
  HISTORY=/var/lib/fakedocker/pull_history.log

  # CHECK: pulled_busybox
  if grep -q "^busybox:latest$" "$HISTORY" 2>/dev/null; then
    echo "CHECK:pulled_busybox:PASS:busybox:latest was pulled"
  else
    echo "CHECK:pulled_busybox:FAIL:busybox image was never pulled — run 'docker pull busybox'"
  fi

  # CHECK: pulled_nginx
  if [ -d "$IMAGES/nginx:latest" ]; then
    echo "CHECK:pulled_nginx:PASS:nginx:latest is present in the image cache"
  else
    echo "CHECK:pulled_nginx:FAIL:nginx image not found — run 'docker pull nginx'"
  fi

  # CHECK: removed_busybox
  if [ ! -d "$IMAGES/busybox:latest" ] && [ -d "$IMAGES/nginx:latest" ]; then
    echo "CHECK:removed_busybox:PASS:busybox was removed and nginx remains cached"
  else
    echo "CHECK:removed_busybox:FAIL:Run 'docker rmi busybox' after pulling both images"
  fi

hints:
  - "docker pull <image> without a tag defaults to :latest."
  - "docker images shows every image currently in your local cache."
  - "docker rmi <image> only works if no container is currently using that image."
  - "Pull busybox, pull nginx, THEN remove busybox — the cache should end with only nginx."
