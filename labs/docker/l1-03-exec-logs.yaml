# ──────────────────────────────────────────────────────────────────────────────
# Docker Lab: Logs & Exec — Talking to a Running Container
# ──────────────────────────────────────────────────────────────────────────────

id: "docker-exec-logs"
title: "Logs & Exec: Talking to a Running Container"
track: "docker"
level: 1
category: "Docker Fundamentals"
difficulty: "beginner"
summary: "Inspect a running container's output with docker logs and run one-off commands inside it with docker exec."
estimatedMinutes: 15
order: 300

objectives:
  - "Read a container's output with docker logs"
  - "Run an extra command inside an already-running container with docker exec"
  - "Understand that exec runs a NEW process inside a container that already exists"

instructions: |
  ## Logs & Exec: Talking to a Running Container

  **Scenario**
  A container is running in your environment and something looks off. You
  need to check its output without stopping it, then run a one-off diagnostic
  command inside it — again without interrupting the main process. This is
  the bread-and-butter of live container debugging.

  **Your task:** start a `busybox` container named `logger` in detached mode
  using the command below, read its output with `docker logs logger`, then
  use `docker exec` to write the text `reached-via-exec` into the file
  `/root/work/exec-proof.txt` — while `logger` is still running.

  Start the container:
  `docker run -d --name logger busybox sh -c 'while true; do echo tick; sleep 1; done'`

  Create the proof file via exec (do **not** stop logger first):
  `docker exec logger sh -c 'echo reached-via-exec > /root/work/exec-proof.txt'`

  This sandbox runs a teaching-mode `docker` CLI — same commands and output
  as the real thing. `vi` is available if needed.

  **What You'll Deliver**
  - `logger` container running with `tick` lines visible in `docker logs logger`
  - `/root/work/exec-proof.txt` containing `reached-via-exec`, created while `logger` stayed running

  ## Steps

  1. Start logger in the background:
     `docker run -d --name logger busybox sh -c 'while true; do echo tick; sleep 1; done'`
  2. Read its output: `docker logs logger` — you should see one or more `tick` lines
  3. While logger is still running, create the proof file:
     `docker exec logger sh -c 'echo reached-via-exec > /root/work/exec-proof.txt'`
  4. Confirm logger is still running: `docker ps`
  5. Confirm the file exists: `cat /root/work/exec-proof.txt`

tasks:
  - id: "logger_running_with_output"
    description: "Container logger is running and docker logs shows its ticking output"
  - id: "exec_proof_created"
    description: "docker exec was used against logger to create /root/work/exec-proof.txt with 'reached-via-exec'"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/work"

setupScript: |
  mkdir -p /usr/local/bin /var/lib/fakedocker/images /var/lib/fakedocker/containers /var/lib/fakedocker/volumes /root/work
  cat > /usr/local/bin/docker <<'DOCKEREOF'
  #!/bin/sh
  # Minimal educational Docker CLI simulator.
  # This sandbox has no privileged/nested-container support, so real dockerd
  # cannot run here. This script implements the real subset of `docker`
  # commands/output format needed to teach the concept: it really spawns and
  # kills processes for containers, really writes/reads log files, and really
  # persists data through symlinked volume directories.
  ROOT=/var/lib/fakedocker
  IMAGES="$ROOT/images"
  CONTAINERS="$ROOT/containers"
  VOLUMES="$ROOT/volumes"
  mkdir -p "$IMAGES" "$CONTAINERS" "$VOLUMES"
  
  image_size() {
    case "$1" in
      busybox) echo 4 ;;
      alpine) echo 7 ;;
      nginx) echo 142 ;;
      ubuntu) echo 78 ;;
      *) echo 10 ;;
    esac
  }
  
  fake_id() {
    n="$1-$$-$RANDOM_SEED"
    echo "$n" | cksum | cut -d' ' -f1 | cut -c1-12
  }
  RANDOM_SEED=0
  
  norm_image() {
    # Ensure IMAGE has a :TAG, defaulting to :latest
    case "$1" in
      *:*) echo "$1" ;;
      *) echo "$1:latest" ;;
    esac
  }
  
  ensure_image() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      repo=${img%%:*}
      mkdir -p "$dir"
      fake_id "$img" > "$dir/id"
      image_size "$repo" > "$dir/size"
      echo "base" > "$dir/kind"
    fi
    echo "$dir"
  }
  
  cmd_pull() {
    img=$(norm_image "$1")
    echo "$img: Pulling from library/${img%%:*}"
    echo "Digest: sha256:$(fake_id "$img")0000000000000000000000000000000000000000000000"
    ensure_image "$img" >/dev/null
    echo "$img" >> "$ROOT/pull_history.log"
    echo "Status: Downloaded newer image for $img"
  }
  
  cmd_images() {
    printf "%-20s %-10s %-15s %s\n" "REPOSITORY" "TAG" "IMAGE ID" "SIZE"
    for d in "$IMAGES"/*/; do
      [ -d "$d" ] || continue
      name=$(basename "$d")
      repo=${name%%:*}
      tag=${name#*:}
      id=$(cat "$d/id" 2>/dev/null || echo "unknown")
      size=$(cat "$d/size" 2>/dev/null || echo "0")
      printf "%-20s %-10s %-15s %sMB\n" "$repo" "$tag" "$id" "$size"
    done
  }
  
  cmd_rmi() {
    img=$(norm_image "$1")
    dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then
      echo "Error: No such image: $img" >&2
      exit 1
    fi
    # Refuse if a container (running or stopped) still references this image, like real docker.
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      if [ "$(cat "$c/image" 2>/dev/null)" = "$img" ]; then
        echo "Error response from daemon: conflict: unable to remove repository reference \"$img\" (must force) - container $(basename "$c") is using its referenced image" >&2
        exit 1
      fi
    done
    rm -rf "$dir"
    echo "Untagged: $img"
    echo "Deleted: sha256:$(fake_id "$img")"
  }
  
  cmd_inspect() {
    target="$1"
    img="$IMAGES/$(norm_image "$target")"
    if [ -d "$img" ]; then
      echo "{"
      echo "  \"Type\": \"image\","
      echo "  \"RepoTags\": [\"$(norm_image "$target")\"],"
      echo "  \"Id\": \"sha256:$(cat "$img/id")\","
      echo "  \"Size\": $(cat "$img/size")000000"
      echo "}"
      return 0
    fi
    c="$CONTAINERS/$target"
    if [ -d "$c" ]; then
      echo "{"
      echo "  \"Type\": \"container\","
      echo "  \"Name\": \"/$target\","
      echo "  \"Image\": \"$(cat "$c/image")\","
      echo "  \"State\": { \"Status\": \"$(cat "$c/status")\" }"
      echo "}"
      return 0
    fi
    echo "Error: No such object: $target" >&2
    exit 1
  }
  
  cmd_run() {
    DETACH=0
    NAME=""
    VOL_SPEC=""
    while [ $# -gt 0 ]; do
      case "$1" in
        -d|--detach) DETACH=1; shift ;;
        --name) NAME="$2"; shift 2 ;;
        -v) VOL_SPEC="$2"; shift 2 ;;
        *) break ;;
      esac
    done
    IMAGE="$1"
    if [ -z "$IMAGE" ]; then
      echo "docker: run requires an image name" >&2
      exit 1
    fi
    shift
    # Remaining "$@" is the exact command argv to run inside the container --
    # kept as a real array (not flattened to a string) so quoting like
    # `sh -c "echo x > file"` survives intact.
  
    img=$(norm_image "$IMAGE")
    ensure_image "$img" >/dev/null
  
    if [ -z "$NAME" ]; then
      NAME="container_$(fake_id "$img")"
    fi
    cdir="$CONTAINERS/$NAME"
    if [ -d "$cdir" ] && [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: Conflict. The container name \"/$NAME\" is already in use" >&2
      exit 1
    fi
    rm -rf "$cdir"
    mkdir -p "$cdir"
    echo "$img" > "$cdir/image"
    cid=$(fake_id "$NAME")
    echo "$cid" > "$cdir/id"
    : > "$cdir/log"
  
    if [ -n "$VOL_SPEC" ]; then
      volname=${VOL_SPEC%%:*}
      mountpath=${VOL_SPEC#*:}
      mkdir -p "$VOLUMES/$volname"
      rm -rf "$mountpath"
      mkdir -p "$(dirname "$mountpath")"
      ln -sfn "$VOLUMES/$volname" "$mountpath"
      echo "$VOL_SPEC" > "$cdir/volume"
    fi
  
    if [ "$DETACH" = "1" ]; then
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      else
        sh -c 'while true; do sleep 3600; done' >"$cdir/log" 2>&1 &
        echo $! > "$cdir/pid"
      fi
      echo "$cid"
    else
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then
        "$@" 2>&1 | tee "$cdir/log"
      fi
      echo "exited" > "$cdir/status"
    fi
  }
  
  cmd_ps() {
    show_all=0
    [ "$1" = "-a" ] && show_all=1
    printf "%-14s %-20s %-10s %s\n" "CONTAINER ID" "IMAGE" "STATUS" "NAMES"
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue
      name=$(basename "$c")
      status=$(cat "$c/status" 2>/dev/null || echo "unknown")
      if [ "$status" != "running" ] && [ "$show_all" != "1" ]; then
        continue
      fi
      id=$(cat "$c/id" 2>/dev/null || echo "??")
      img=$(cat "$c/image" 2>/dev/null || echo "??")
      printf "%-14s %-20s %-10s %s\n" "$id" "$img" "$status" "$name"
    done
  }
  
  cmd_stop() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ -f "$cdir/pid" ]; then
      pid=$(cat "$cdir/pid")
      kill "$pid" 2>/dev/null
      # also kill any child sh -c process tree started under it
      pkill -P "$pid" 2>/dev/null
    fi
    echo "exited" > "$cdir/status"
    echo "$name"
  }
  
  cmd_rm() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    if [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then
      echo "Error response from daemon: You cannot remove a running container $name. Stop it first." >&2
      exit 1
    fi
    rm -rf "$cdir"
    echo "$name"
  }
  
  cmd_logs() {
    name="$1"
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    cat "$cdir/log" 2>/dev/null
  }
  
  cmd_exec() {
    name="$1"; shift
    cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ] || [ "$(cat "$cdir/status" 2>/dev/null)" != "running" ]; then
      echo "Error: No such container: $name" >&2
      exit 1
    fi
    "$@"
  }
  
  cmd_build() {
    tag=""
    ctx="."
    while [ $# -gt 0 ]; do
      case "$1" in
        -t) tag="$2"; shift 2 ;;
        *) ctx="$1"; shift ;;
      esac
    done
    dockerfile="$ctx/Dockerfile"
    if [ ! -f "$dockerfile" ]; then
      echo "unable to prepare context: unable to evaluate symlinks in Dockerfile path: Dockerfile: no such file or directory" >&2
      exit 1
    fi
    if ! grep -qE '^FROM[[:space:]]+' "$dockerfile"; then
      echo "Error: Dockerfile is missing a FROM instruction" >&2
      exit 1
    fi
    base=$(grep -E '^FROM[[:space:]]+' "$dockerfile" | head -1 | awk '{print $2}')
    steps=$(grep -cE '^(RUN|COPY|ADD|CMD|ENTRYPOINT|ENV|EXPOSE|WORKDIR|LABEL)[[:space:]]' "$dockerfile")
    if [ -z "$tag" ]; then
      echo "docker: build requires -t NAME:TAG" >&2
      exit 1
    fi
    img=$(norm_image "$tag")
    n=1
    total=$((steps + 1))
    echo "Sending build context to Docker daemon"
    echo "Step 1/$total : FROM $base"
    i=1
    while IFS= read -r line; do
      case "$line" in
        FROM*) continue ;;
        "") continue ;;
        \#*) continue ;;
      esac
      i=$((i + 1))
      echo "Step $i/$total : $line"
    done < "$dockerfile"
    dir=$(ensure_image "$img")
    echo "custom" > "$dir/kind"
    echo "$base" > "$dir/base"
    cp "$dockerfile" "$dir/Dockerfile"
    echo "Successfully built $(fake_id "$img")"
    echo "Successfully tagged $img"
  }
  
  cmd_volume() {
    sub="$1"; shift
    case "$sub" in
      create)
        name="$1"
        mkdir -p "$VOLUMES/$name"
        echo "$name"
        ;;
      ls)
        printf "%-20s %s\n" "DRIVER" "VOLUME NAME"
        for d in "$VOLUMES"/*/; do
          [ -d "$d" ] || continue
          printf "%-20s %s\n" "local" "$(basename "$d")"
        done
        ;;
      rm)
        rm -rf "${VOLUMES:?}/$1"
        echo "$1"
        ;;
      *)
        echo "docker volume: unknown subcommand $sub" >&2
        exit 1
        ;;
    esac
  }
  
  case "$1" in
    pull) shift; cmd_pull "$@" ;;
    images) shift; cmd_images "$@" ;;
    rmi) shift; cmd_rmi "$@" ;;
    inspect) shift; cmd_inspect "$@" ;;
    run) shift; cmd_run "$@" ;;
    ps) shift; cmd_ps "$@" ;;
    stop) shift; cmd_stop "$@" ;;
    rm) shift; cmd_rm "$@" ;;
    logs) shift; cmd_logs "$@" ;;
    exec) shift; cmd_exec "$@" ;;
    build) shift; cmd_build "$@" ;;
    volume) shift; cmd_volume "$@" ;;
    version) echo "Docker version 24.0.0 (lab-sandbox)" ;;
    *)
      echo "docker: unknown command '$1'" >&2
      exit 1
      ;;
  esac
  DOCKEREOF
  chmod +x /usr/local/bin/docker

verifyScript: |
  CONTAINERS=/var/lib/fakedocker/containers

  # CHECK: logger_running_with_output
  if [ -d "$CONTAINERS/logger" ] \
     && [ "$(cat "$CONTAINERS/logger/status" 2>/dev/null)" = "running" ] \
     && grep -q "tick" "$CONTAINERS/logger/log" 2>/dev/null; then
    echo "CHECK:logger_running_with_output:PASS:logger is running and producing output"
  else
    echo "CHECK:logger_running_with_output:FAIL:Start logger with docker run -d --name logger busybox sh -c \"i=0; while true; do echo tick \\\$i; i=\\\$((i+1)); sleep 1; done\""
  fi

  # CHECK: exec_proof_created
  if [ -d "$CONTAINERS/logger" ] \
     && [ "$(cat "$CONTAINERS/logger/status" 2>/dev/null)" = "running" ] \
     && [ -f /root/work/exec-proof.txt ] \
     && grep -q "reached-via-exec" /root/work/exec-proof.txt; then
    echo "CHECK:exec_proof_created:PASS:exec-proof.txt was created via docker exec while logger stayed running"
  else
    echo "CHECK:exec_proof_created:FAIL:Use docker exec logger to write 'reached-via-exec' into /root/work/exec-proof.txt, and keep logger running"
  fi

hints:
  - "docker logs only shows past output — it won't stream new lines unless you add -f (not needed here)."
  - "docker exec <name> <cmd> requires the container to already be running via docker run -d."
  - "Escaping the dollar sign inside a double-quoted -c string keeps the variable from expanding too early."
  - "docker exec logger sh -c \"echo reached-via-exec > /root/work/exec-proof.txt\""
