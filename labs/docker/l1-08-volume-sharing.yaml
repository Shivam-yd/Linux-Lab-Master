# ──────────────────────────────────────────────────────────────────────────────
# Docker Lab: Sharing Data Between Containers with Volumes
# ──────────────────────────────────────────────────────────────────────────────

id: "docker-volume-sharing"
title: "Sharing Data Between Containers with Volumes"
track: "docker"
level: 1
category: "Docker Fundamentals"
difficulty: "beginner"
summary: "Use a named volume to pass data from a writer container to a reader container, proving persistence across container lifetimes."
estimatedMinutes: 20
order: 800

objectives:
  - "Create a named volume with docker volume create"
  - "Mount the same volume in two separate containers with -v"
  - "Prove that data written by one container is readable by another"
  - "Understand why volumes outlive the containers that use them"

instructions: |
  ## Sharing Data Between Containers with Volumes

  **Scenario**
  A reporting pipeline runs in two stages: a **writer** container that produces
  a report file, and a **reader** container that picks it up. Both containers
  are ephemeral — they start, do their work, and exit. A named Docker volume
  is the bridge: it exists independently of any container and can be mounted
  by as many containers as needed.

  ---

  **Quick Reference — copy and run these commands in order:**

  ```
  docker volume create report-data
  docker volume ls
  docker run --name writer -v report-data:/data busybox sh -c "echo 'monthly-report-2024' > /data/report.txt && echo 'status: complete' >> /data/report.txt"
  docker ps -a
  docker run --name reader -v report-data:/data busybox sh -c "cat /data/report.txt > /root/work/read-confirm.txt"
  cat /root/work/read-confirm.txt
  ```

  ---

  **Details**

  | What | Value |
  |------|-------|
  | Volume name | `report-data` |
  | Image to use | `busybox` |
  | Mount path inside container | `/data` |
  | File the writer creates | `/data/report.txt` |
  | Content written | `monthly-report-2024` (line 1) and `status: complete` (line 2) |
  | File the reader produces | `/root/work/read-confirm.txt` (on the host, not in the volume) |

  **Step-by-step:**

  1. **Create the volume** — `docker volume create report-data`
     Creates a named volume called `report-data` that persists independently of any container.

  2. **Verify it exists** — `docker volume ls`
     You should see `report-data` listed.

  3. **Run the writer container** using image `busybox`, mount `report-data` at `/data`, write two lines to `/data/report.txt`:
     `docker run --name writer -v report-data:/data busybox sh -c "echo 'monthly-report-2024' > /data/report.txt && echo 'status: complete' >> /data/report.txt"`

  4. **Confirm the writer exited** — `docker ps -a`
     The writer should show status `exited`. That is expected — it did its job and stopped.

  5. **Run the reader container** — same image `busybox`, same volume `report-data` at `/data`.
     It reads `/data/report.txt` and saves the contents to `/root/work/read-confirm.txt`:
     `docker run --name reader -v report-data:/data busybox sh -c "cat /data/report.txt > /root/work/read-confirm.txt"`

  6. **Verify the output file** — `cat /root/work/read-confirm.txt`
     You should see both lines from the writer, proving the reader successfully read from the shared volume.

tasks:
  - id: "volume_created"
    description: "Named volume report-data exists"
  - id: "writer_wrote_data"
    description: "writer container ran and wrote report.txt to the report-data volume"
  - id: "reader_confirmed"
    description: "reader container ran and produced /root/work/read-confirm.txt"

image: "alpine:latest"
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/work"

setupScript: |
  mkdir -p /usr/local/bin /var/lib/fakedocker/images /var/lib/fakedocker/containers /var/lib/fakedocker/volumes /root/work
  cat > /usr/local/bin/docker <<'DOCKEREOF'
  #!/bin/sh
  ROOT=/var/lib/fakedocker
  IMAGES="$ROOT/images"
  CONTAINERS="$ROOT/containers"
  VOLUMES="$ROOT/volumes"
  mkdir -p "$IMAGES" "$CONTAINERS" "$VOLUMES"
  image_size() { case "$1" in busybox) echo 4 ;; alpine) echo 7 ;; *) echo 10 ;; esac; }
  fake_id() { n="$1-$$-$RANDOM_SEED"; echo "$n" | cksum | cut -d' ' -f1 | cut -c1-12; }
  RANDOM_SEED=0
  norm_image() { case "$1" in *:*) echo "$1" ;; *) echo "$1:latest" ;; esac; }
  ensure_image() {
    img=$(norm_image "$1"); dir="$IMAGES/$img"
    if [ ! -d "$dir" ]; then repo=${img%%:*}; mkdir -p "$dir"; fake_id "$img" > "$dir/id"; image_size "$repo" > "$dir/size"; echo "base" > "$dir/kind"; fi
    echo "$dir"
  }
  cmd_pull() {
    img=$(norm_image "$1"); echo "$img: Pulling from library/${img%%:*}"
    ensure_image "$img" >/dev/null; echo "$img" >> "$ROOT/pull_history.log"; echo "Status: Downloaded newer image for $img"
  }
  cmd_images() {
    printf "%-20s %-10s %-15s %s\n" "REPOSITORY" "TAG" "IMAGE ID" "SIZE"
    for d in "$IMAGES"/*/; do
      [ -d "$d" ] || continue; name=$(basename "$d"); repo=${name%%:*}; tag=${name#*:}
      id=$(cat "$d/id" 2>/dev/null || echo "unknown"); size=$(cat "$d/size" 2>/dev/null || echo "0")
      printf "%-20s %-10s %-15s %sMB\n" "$repo" "$tag" "$id" "$size"
    done
  }
  cmd_rmi() {
    img=$(norm_image "$1"); dir="$IMAGES/$img"; [ ! -d "$dir" ] && { echo "Error: No such image: $img" >&2; exit 1; }
    for c in "$CONTAINERS"/*/; do [ -d "$c" ] || continue; [ "$(cat "$c/image" 2>/dev/null)" = "$img" ] && { echo "Error response from daemon: conflict: unable to remove $img — container in use" >&2; exit 1; }; done
    rm -rf "$dir"; echo "Untagged: $img"
  }
  cmd_inspect() {
    target="$1"; img="$IMAGES/$(norm_image "$target")"
    if [ -d "$img" ]; then echo "{"; echo "  \"Type\": \"image\","; echo "  \"RepoTags\": [\"$(norm_image "$target")\"],"; echo "  \"Id\": \"sha256:$(cat "$img/id")\""; echo "}"; return 0; fi
    c="$CONTAINERS/$target"
    if [ -d "$c" ]; then echo "{"; echo "  \"Type\": \"container\","; echo "  \"Name\": \"/$target\","; echo "  \"Image\": \"$(cat "$c/image")\","; echo "  \"State\": { \"Status\": \"$(cat "$c/status")\" }"; echo "}"; return 0; fi
    echo "Error: No such object: $target" >&2; exit 1
  }
  cmd_run() {
    DETACH=0; NAME=""; VOL_SPEC=""
    while [ $# -gt 0 ]; do case "$1" in -d|--detach) DETACH=1; shift ;; --name) NAME="$2"; shift 2 ;; -v) VOL_SPEC="$2"; shift 2 ;; *) break ;; esac; done
    IMAGE="$1"; [ -z "$IMAGE" ] && { echo "docker: run requires an image name" >&2; exit 1; }
    shift; img=$(norm_image "$IMAGE"); ensure_image "$img" >/dev/null
    [ -z "$NAME" ] && NAME="container_$(fake_id "$img")"
    cdir="$CONTAINERS/$NAME"
    if [ -d "$cdir" ] && [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ]; then echo "Error response from daemon: Conflict. The container name \"/$NAME\" is already in use" >&2; exit 1; fi
    rm -rf "$cdir"; mkdir -p "$cdir"; echo "$img" > "$cdir/image"; cid=$(fake_id "$NAME"); echo "$cid" > "$cdir/id"; : > "$cdir/log"
    if [ -n "$VOL_SPEC" ]; then
      volname=${VOL_SPEC%%:*}; mountpath=${VOL_SPEC#*:}
      mkdir -p "$VOLUMES/$volname"; rm -rf "$mountpath"; mkdir -p "$(dirname "$mountpath")"; ln -sfn "$VOLUMES/$volname" "$mountpath"
      echo "$VOL_SPEC" > "$cdir/volume"
    fi
    if [ "$DETACH" = "1" ]; then
      echo "running" > "$cdir/status"
      if [ $# -gt 0 ]; then "$@" >"$cdir/log" 2>&1 & echo $! > "$cdir/pid"; else sh -c 'while true; do sleep 3600; done' >"$cdir/log" 2>&1 & echo $! > "$cdir/pid"; fi
      echo "$cid"
    else
      echo "running" > "$cdir/status"; [ $# -gt 0 ] && "$@" 2>&1 | tee "$cdir/log"; echo "exited" > "$cdir/status"
    fi
  }
  cmd_ps() {
    show_all=0; [ "$1" = "-a" ] && show_all=1
    printf "%-14s %-20s %-10s %s\n" "CONTAINER ID" "IMAGE" "STATUS" "NAMES"
    for c in "$CONTAINERS"/*/; do
      [ -d "$c" ] || continue; name=$(basename "$c"); status=$(cat "$c/status" 2>/dev/null || echo "unknown")
      [ "$status" != "running" ] && [ "$show_all" != "1" ] && continue
      id=$(cat "$c/id" 2>/dev/null || echo "??"); img=$(cat "$c/image" 2>/dev/null || echo "??")
      printf "%-14s %-20s %-10s %s\n" "$id" "$img" "$status" "$name"
    done
  }
  cmd_stop() {
    name="$1"; cdir="$CONTAINERS/$name"; [ ! -d "$cdir" ] && { echo "Error: No such container: $name" >&2; exit 1; }
    [ -f "$cdir/pid" ] && { pid=$(cat "$cdir/pid"); kill "$pid" 2>/dev/null; pkill -P "$pid" 2>/dev/null; }
    echo "exited" > "$cdir/status"; echo "$name"
  }
  cmd_rm() {
    name="$1"; cdir="$CONTAINERS/$name"; [ ! -d "$cdir" ] && { echo "Error: No such container: $name" >&2; exit 1; }
    [ "$(cat "$cdir/status" 2>/dev/null)" = "running" ] && { echo "Error response from daemon: You cannot remove a running container $name. Stop it first." >&2; exit 1; }
    rm -rf "$cdir"; echo "$name"
  }
  cmd_logs() { name="$1"; cdir="$CONTAINERS/$name"; [ ! -d "$cdir" ] && { echo "Error: No such container: $name" >&2; exit 1; }; cat "$cdir/log" 2>/dev/null; }
  cmd_exec() {
    name="$1"; shift; cdir="$CONTAINERS/$name"
    if [ ! -d "$cdir" ] || [ "$(cat "$cdir/status" 2>/dev/null)" != "running" ]; then echo "Error: No such container: $name" >&2; exit 1; fi
    "$@"
  }
  cmd_build() {
    tag=""; ctx="."
    while [ $# -gt 0 ]; do case "$1" in -t) tag="$2"; shift 2 ;; *) ctx="$1"; shift ;; esac; done
    dockerfile="$ctx/Dockerfile"; [ ! -f "$dockerfile" ] && { echo "unable to prepare context: Dockerfile not found" >&2; exit 1; }
    grep -qE '^FROM[[:space:]]+' "$dockerfile" || { echo "Error: Dockerfile missing FROM" >&2; exit 1; }
    base=$(grep -E '^FROM[[:space:]]+' "$dockerfile" | head -1 | awk '{print $2}')
    steps=$(grep -cE '^(RUN|COPY|ADD|CMD|ENTRYPOINT|ENV|EXPOSE|WORKDIR|LABEL)[[:space:]]' "$dockerfile")
    [ -z "$tag" ] && { echo "docker: build requires -t NAME:TAG" >&2; exit 1; }
    img=$(norm_image "$tag"); total=$((steps + 1))
    echo "Sending build context to Docker daemon"; echo "Step 1/$total : FROM $base"
    i=1; while IFS= read -r line; do case "$line" in FROM*|""|"#"*) continue ;; esac; i=$((i+1)); echo "Step $i/$total : $line"; done < "$dockerfile"
    dir=$(ensure_image "$img"); echo "custom" > "$dir/kind"; echo "$base" > "$dir/base"; cp "$dockerfile" "$dir/Dockerfile"
    echo "Successfully built $(fake_id "$img")"; echo "Successfully tagged $img"
  }
  cmd_volume() {
    sub="$1"; shift
    case "$sub" in
      create) name="$1"; mkdir -p "$VOLUMES/$name"; echo "$name" ;;
      ls) printf "%-20s %s\n" "DRIVER" "VOLUME NAME"; for d in "$VOLUMES"/*/; do [ -d "$d" ] || continue; printf "%-20s %s\n" "local" "$(basename "$d")"; done ;;
      rm) rm -rf "${VOLUMES:?}/$1"; echo "$1" ;;
      *) echo "docker volume: unknown subcommand $sub" >&2; exit 1 ;;
    esac
  }
  case "$1" in
    pull) shift; cmd_pull "$@" ;; images) shift; cmd_images "$@" ;; rmi) shift; cmd_rmi "$@" ;;
    inspect) shift; cmd_inspect "$@" ;; run) shift; cmd_run "$@" ;; ps) shift; cmd_ps "$@" ;;
    stop) shift; cmd_stop "$@" ;; rm) shift; cmd_rm "$@" ;; logs) shift; cmd_logs "$@" ;;
    exec) shift; cmd_exec "$@" ;; build) shift; cmd_build "$@" ;; volume) shift; cmd_volume "$@" ;;
    version) echo "Docker version 24.0.0 (lab-sandbox)" ;;
    *) echo "docker: unknown command '$1'" >&2; exit 1 ;;
  esac
  DOCKEREOF
  chmod +x /usr/local/bin/docker

verifyScript: |
  V=/var/lib/fakedocker/volumes
  C=/var/lib/fakedocker/containers

  # CHECK: volume_created
  if [ -d "$V/report-data" ]; then
    echo "CHECK:volume_created:PASS:report-data volume exists"
  else
    echo "CHECK:volume_created:FAIL:Volume not found — run: docker volume create report-data"
  fi

  # CHECK: writer_wrote_data
  if [ -f "$V/report-data/report.txt" ]; then
    echo "CHECK:writer_wrote_data:PASS:report.txt written to report-data volume by writer container"
  else
    echo "CHECK:writer_wrote_data:FAIL:report.txt not found in volume — run the writer container: docker run --name writer -v report-data:/data busybox sh -c \"echo 'data' > /data/report.txt\""
  fi

  # CHECK: reader_confirmed
  if [ -f /root/work/read-confirm.txt ] && [ -s /root/work/read-confirm.txt ]; then
    echo "CHECK:reader_confirmed:PASS:/root/work/read-confirm.txt created by the reader container"
  else
    echo "CHECK:reader_confirmed:FAIL:/root/work/read-confirm.txt missing or empty — run the reader container: docker run --name reader -v report-data:/data busybox sh -c \"cat /data/report.txt > /root/work/read-confirm.txt\""
  fi

hints:
  - "docker volume create report-data creates the volume. -v report-data:/data mounts it into the container at /data."
  - "The writer and reader mount the SAME volume name — that's how data flows between them."
  - "The reader writes to /root/work/read-confirm.txt, which is a real host path (not a volume path)."
  - "docker ps -a shows both containers after they exit — both should show status 'exited', which is normal."
