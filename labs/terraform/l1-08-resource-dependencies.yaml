# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Resource Dependencies with depends_on
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-resource-dependencies"
title: "Resource Dependencies with depends_on"
track: "terraform"
level: 1
category: "Terraform Fundamentals"
difficulty: "beginner"
summary: "Force an explicit ordering between two resources that have no natural attribute reference between them."
estimatedMinutes: 20
order: 170

objectives:
- "Understand that Terraform infers ordering from attribute references"
- "Add an explicit depends_on when two resources must be ordered but share no reference"
- "Confirm both resources apply successfully with the dependency declared"

instructions: |
  ## Resource Dependencies with depends_on

  **Scenario**
  Your team's configuration provisions an application server that must only be deployed after the network layer is ready. The two resources share no attribute references — the app just uses a hardcoded string — so Terraform has no way to infer the correct order on its own. A race condition in staging last week caused the app to start before networking was ready.

  **Your task:** Write a `main.tf` in `/root/tf-lab` defining `terraform_data.network_setup` and `terraform_data.app_deploy`, where `app_deploy` uses `depends_on` to explicitly require `network_setup` first, then apply both resources.

  No text editor is installed — use heredoc redirection: `cat > main.tf <<'EOF' ... EOF`

  **What You'll Deliver**
  - `terraform_data.app_deploy` configured with `depends_on = [terraform_data.network_setup]`
  - Both resources applied and recorded in state

  ## Steps

  1. `mkdir -p /root/tf-lab && cd /root/tf-lab`
  2. Create `main.tf` with both `terraform_data.network_setup` and `terraform_data.app_deploy`; add `depends_on = [terraform_data.network_setup]` inside `app_deploy`
  3. `terraform init`
  4. `terraform apply -auto-approve`

tasks:
- id: "depends_on_declared"
  description: "app_deploy's resource block includes depends_on = [terraform_data.network_setup]"
- id: "both_applied"
  description: "terraform.tfstate records both terraform_data.network_setup and terraform_data.app_deploy"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  STATE="$LAB/terraform.tfstate"

  # CHECK: depends_on_declared
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'depends_on[[:space:]]*=[[:space:]]*\[terraform_data\.network_setup\]'; then
    echo "CHECK:depends_on_declared:PASS:app_deploy declares depends_on = [terraform_data.network_setup]"
  else
    echo "CHECK:depends_on_declared:FAIL:app_deploy's resource block must include depends_on = [terraform_data.network_setup]"
  fi

  # CHECK: both_applied
  if [ -f "$STATE" ] && grep -q '"network_setup"' "$STATE" 2>/dev/null && grep -q '"app_deploy"' "$STATE" 2>/dev/null; then
    echo "CHECK:both_applied:PASS:both resources are recorded in state"
  else
    echo "CHECK:both_applied:FAIL:Run terraform apply -auto-approve so both resources are created"
  fi

hints:
- "depends_on takes a list of resource references, even if there's only one: depends_on = [terraform_data.network_setup]."
- "depends_on belongs inside the dependent resource's block (app_deploy), not the one it depends on."
- "Terraform only needs depends_on when there's no attribute reference to infer the order from automatically."

