# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Lifecycle & Output Preconditions
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-lifecycle-conditions"
title: "Custom Conditions: Preconditions"
track: "terraform"
level: 2
category: "Infrastructure as Code"
difficulty: "intermediate"
summary: "Guard resources and outputs with precondition blocks that fail fast with a clear error message when an assumption is violated."
estimatedMinutes: 25
order: 220

objectives:
  - "Add a precondition to a resource's lifecycle block"
  - "Add a precondition to an output block"
  - "Trigger a precondition failure and read the resulting error"
  - "Apply successfully once the input satisfies both conditions"

instructions: |
  ## Terraform Custom Conditions: Preconditions

  **Scenario**
  A colleague passed `replica_count=50` to a shared Terraform module last week and Terraform happily applied it — spinning up 50 instances before anyone noticed the config was wrong. Type validation alone wasn't enough because the constraint requires checking against a range, not just a type. You've been asked to add `precondition` blocks so Terraform fails fast with a clear error before any resource is created or any output is exposed.

  **Your task:** Write `variables.tf` with a `replica_count` variable, write `main.tf` with a `terraform_data` resource that has a lifecycle `precondition` asserting the count is between 1 and 10, write `outputs.tf` with an output `precondition`, then run `terraform apply` with a valid value and verify the failure message appears when you pass an invalid value.

  **What You'll Deliver**
  - `main.tf` with a `terraform_data` resource containing a `lifecycle { precondition { ... } }` block
  - `outputs.tf` with an output block containing a `precondition` block
  - A successful `terraform apply` recorded in state with a valid `replica_count`

  ## Steps

  1. `cd /root/tf-lab`
  2. Write `variables.tf` declaring `variable "replica_count" { type = number; default = 3 }`
  3. Write `main.tf` with a `terraform_data "fleet"` resource whose `lifecycle` block contains a `precondition` asserting `var.replica_count >= 1 && var.replica_count <= 10`
  4. Write `outputs.tf` with an `output "replicas"` block whose `precondition` asserts `terraform_data.fleet.output.replicas > 0`
  5. `terraform init`
  6. `terraform apply -auto-approve`
  7. `terraform apply -auto-approve -var="replica_count=50"` — expect the precondition error message

tasks:
  - id: "resource_precondition"
    description: "main.tf defines a terraform_data resource with a lifecycle precondition block"
  - id: "output_precondition"
    description: "outputs.tf defines an output with a precondition block"
  - id: "apply_succeeded"
    description: "terraform apply has been run with valid input and state records the resource"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
  - name: "main"
    user: "root"
    cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  OUT="$LAB/outputs.tf"

  # Task 1: resource precondition
  if [ -f "$MAIN" ] \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'resource[[:space:]]+"terraform_data"' \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'precondition[[:space:]]*\{'; then
    echo "CHECK:resource_precondition:PASS:terraform_data resource with a lifecycle precondition found in main.tf"
  else
    echo "CHECK:resource_precondition:FAIL:main.tf must define a terraform_data resource with a lifecycle { precondition { ... } } block"
  fi

  # Task 2: output precondition
  if [ -f "$OUT" ] \
    && grep -v '^[[:space:]]*#' "$OUT" | grep -qE 'output[[:space:]]+"' \
    && grep -v '^[[:space:]]*#' "$OUT" | grep -qE 'precondition[[:space:]]*\{'; then
    echo "CHECK:output_precondition:PASS:output with a precondition block found in outputs.tf"
  else
    echo "CHECK:output_precondition:FAIL:outputs.tf must define an output block containing a precondition { ... } block"
  fi

  # Task 3: state has a managed resource
  STATE="$LAB/terraform.tfstate"
  if [ -f "$STATE" ] && grep -q '"mode":[[:space:]]*"managed"' "$STATE" 2>/dev/null; then
    echo "CHECK:apply_succeeded:PASS:terraform.tfstate records a managed resource"
  else
    echo "CHECK:apply_succeeded:FAIL:No applied state found. Run: terraform init && terraform apply -auto-approve"
  fi

hints:
  - "precondition blocks were added in Terraform 1.2 — this image (1.9) supports them natively."
  - "A resource precondition goes inside lifecycle { precondition { condition = ...; error_message = ... } }."
  - "Outputs only support precondition (not postcondition) — put it directly inside the output block, referencing the resource output rather than `self`."
  - "If apply fails with your custom error_message, that's the lab working correctly — fix the input and re-apply."
