# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Terraform Workspaces
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-workspace-basics"
title: "Workspaces"
track: "terraform"
level: 2
category: "State Management"
difficulty: "intermediate"
summary: "Use terraform workspace to maintain separate state for the same config under different named workspaces (e.g. dev vs. staging)."
estimatedMinutes: 20
order: 260

objectives:
- "Create a new named workspace with terraform workspace new"
- "Apply the same config independently in two different workspaces"
- "Use terraform.workspace inside a resource to make behavior workspace-aware"

instructions: |
  ## Terraform Workspaces

  **Scenario**
  Your team wants dev and staging to run off the exact same .tf files, without duplicating code into separate directories and without the two environments' state ever colliding. Named workspaces solve exactly this: the same config, isolated state per workspace, switched with a single command.

  **Your task:** Write \`main.tf\` in \`/root/tf-lab\` referencing \`terraform.workspace\`, apply it in the default workspace, then create and apply a \`staging\` workspace so its state is stored separately.

  **What You'll Deliver**
  - \`main.tf\`'s \`terraform_data.env_marker\` input referencing \`terraform.workspace\`
  - A workspace named \`staging\` created and listed by \`terraform workspace list\`
  - \`terraform.tfstate.d/staging/terraform.tfstate\` showing \`"running-in-staging"\`, isolated from the default workspace's state

  ## Steps

  1. \`mkdir -p /root/tf-lab && cd /root/tf-lab\`
  2. Create \`main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "env_marker" {
       input = "running-in-\${terraform.workspace}"
     }
     \`\`\`
  3. \`terraform init\`
  4. \`terraform apply -auto-approve\` (default workspace → \`"running-in-default"\`)
  5. \`terraform workspace new staging\`
  6. \`terraform apply -auto-approve\` (staging workspace → \`"running-in-staging"\`, stored in a separate state file)
  7. Confirm isolation: \`terraform workspace list\` and \`ls terraform.tfstate.d/\` → \`staging/terraform.tfstate\` exists separately from the root \`terraform.tfstate\`

tasks:
- id: "workspace_aware_resource"
  description: "main.tf's terraform_data.env_marker input references terraform.workspace"
- id: "staging_workspace_created"
  description: "A workspace named 'staging' exists (terraform workspace list includes it)"
- id: "staging_state_isolated"
  description: "terraform.tfstate.d/staging/terraform.tfstate exists and shows 'running-in-staging', separate from the default workspace's state"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  STAGING_STATE="$LAB/terraform.tfstate.d/staging/terraform.tfstate"

  # CHECK: workspace_aware_resource
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'terraform\.workspace'; then
    echo "CHECK:workspace_aware_resource:PASS:main.tf references terraform.workspace"
  else
    echo "CHECK:workspace_aware_resource:FAIL:main.tf's env_marker input should reference terraform.workspace"
  fi

  # CHECK: staging_workspace_created
  if terraform workspace list 2>/dev/null | grep -qE '(^|[[:space:]])staging$'; then
    echo "CHECK:staging_workspace_created:PASS:staging workspace exists"
  else
    echo "CHECK:staging_workspace_created:FAIL:Run terraform workspace new staging"
  fi

  # CHECK: staging_state_isolated
  if [ -f "$STAGING_STATE" ] && grep -q "running-in-staging" "$STAGING_STATE" 2>/dev/null; then
    echo "CHECK:staging_state_isolated:PASS:staging workspace has its own applied state"
  else
    echo "CHECK:staging_state_isolated:FAIL:After creating the staging workspace, run terraform apply -auto-approve while on it"
  fi

hints:
- "terraform workspace new <name> both creates and switches to the new workspace in one step."
- "terraform.workspace (no var. prefix) is a special expression available anywhere in the config, holding the current workspace's name."
- "Non-default workspace state lives under terraform.tfstate.d/<workspace>/terraform.tfstate — the default workspace still uses the plain terraform.tfstate."
- "terraform workspace select <name> switches back and forth between existing workspaces without creating a new one."

