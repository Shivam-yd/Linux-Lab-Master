# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Conditional Expressions
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-conditional-expressions"
title: "Conditional Expressions"
track: "terraform"
level: 2
category: "Terraform Language"
difficulty: "intermediate"
summary: "Use the condition ? true_val : false_val ternary operator to pick a value based on a variable at plan time."
estimatedMinutes: 20
order: 210

objectives:
- "Write a ternary conditional expression based on a boolean variable"
- "Use a conditional to pick between two literal values"
- "Confirm the applied value matches the branch selected by the input"

instructions: |
  ## Conditional Expressions

  **Scenario**
  Your team's Terraform config needs to size infrastructure differently for production versus everything else, but HCL has no if/else statement — only the ternary conditional operator \`condition ? true_val : false_val\`. You've been asked to wire up a resource whose value branches on a boolean input using this pattern.

  **Your task:** Write \`variables.tf\` and \`main.tf\` in \`/root/tf-lab\` where \`terraform_data.tier\`'s input is set with a ternary expression based on \`var.is_production\`, then apply with \`is_production=true\` so the production branch lands in state.

  **What You'll Deliver**
  - \`terraform_data.tier\`'s input set via \`var.is_production ? "high-availability" : "single-instance"\`
  - Config applied with \`is_production=true\`, so state reflects the high-availability branch

  ## Steps

  1. \`mkdir -p /root/tf-lab && cd /root/tf-lab\`
  2. Create \`variables.tf\`:
     \`\`\`hcl
     variable "is_production" {
       type    = bool
       default = false
     }
     \`\`\`
  3. Create \`main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "tier" {
       input = var.is_production ? "high-availability" : "single-instance"
     }
     \`\`\`
  4. \`terraform init\`
  5. \`terraform apply -auto-approve\` (defaults to \`"single-instance"\`)
  6. \`terraform apply -auto-approve -var="is_production=true"\` (now \`"high-availability"\`)

tasks:
- id: "ternary_used"
  description: "main.tf uses a ternary expression (var.is_production ? ... : ...) to set terraform_data.tier's input"
- id: "production_branch_applied"
  description: "terraform.tfstate reflects the 'high-availability' branch after applying with is_production=true"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  STATE="$LAB/terraform.tfstate"

  # CHECK: ternary_used
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'var\.is_production[[:space:]]*\?'; then
    echo "CHECK:ternary_used:PASS:main.tf uses a ternary expression on var.is_production"
  else
    echo "CHECK:ternary_used:FAIL:main.tf must set terraform_data.tier's input using var.is_production ? \"high-availability\" : \"single-instance\""
  fi

  # CHECK: production_branch_applied
  if [ -f "$STATE" ] && grep -q "high-availability" "$STATE" 2>/dev/null; then
    echo "CHECK:production_branch_applied:PASS:state shows the high-availability branch"
  else
    echo "CHECK:production_branch_applied:FAIL:Run terraform apply -auto-approve -var=\"is_production=true\" to select the high-availability branch"
  fi

hints:
- "Ternary syntax: condition ? value_if_true : value_if_false — no if/else keyword exists in HCL expressions."
- "The condition must evaluate to a bool; var.is_production ? true : false only works if is_production is type bool."
- "Apply twice with different -var values to see both branches land in state."

