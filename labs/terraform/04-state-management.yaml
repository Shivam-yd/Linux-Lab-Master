# ──────────────────────────────────────────────────────────────────────────────
# Linux Lab: Terraform State Manipulation
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-state-management"
title: "Terraform State Manipulation: mv & rm"
track: "terraform"
level: 3
category: "Infrastructure as Code"
difficulty: "advanced"
summary: "Refactor a resource's address without destroying it using terraform state mv, and remove a resource from state tracking with terraform state rm."
estimatedMinutes: 30
order: 330

objectives:
  - "Apply an initial config and inspect the state with terraform state list"
  - "Rename a resource in code and reconcile state with terraform state mv"
  - "Confirm the rename caused no destroy/recreate via terraform plan"
  - "Remove a resource from state tracking with terraform state rm"

instructions: |
  ## Terraform State Manipulation: mv & rm

  **Scenario**
  Your team refactored the infrastructure codebase overnight, renaming `terraform_data.web_server` to `terraform_data.app_server` to match new naming conventions. When a teammate ran `terraform plan` this morning, Terraform wanted to destroy the live web server and create a new one — a production outage. You need to use `terraform state mv` to reconcile the state file with the renamed code, and then use `terraform state rm` to drop a throwaway resource from tracking without destroying it.

  **Your task:** Apply an initial config with `terraform_data.web_server`, rename the resource to `app_server` in `main.tf`, run `terraform state mv` to reconcile state, confirm `terraform plan` shows no changes, then add and apply a `scratch` resource and remove it from state with `terraform state rm`.

  No text editor is installed — use heredoc redirection: `cat > main.tf <<'EOF' ... EOF`

  **What You'll Deliver**
  - `main.tf` updated to define `terraform_data.app_server` with no remaining reference to `web_server`
  - State reconciled via `terraform state mv` so `terraform plan` reports "No changes"
  - `terraform_data.scratch` applied and removed from state tracking with `terraform state rm`

  ## Steps

  1. `cd /root/tf-lab`
  2. Write `main.tf` with `resource "terraform_data" "web_server" { input = "nginx" }`
  3. `terraform init && terraform apply -auto-approve`
  4. `terraform state list` — confirm `terraform_data.web_server` is tracked
  5. Rewrite `main.tf` renaming the resource to `app_server` (keep `input = "nginx"`)
  6. `terraform state mv terraform_data.web_server terraform_data.app_server`
  7. `terraform plan` — confirm "No changes"
  8. Add `resource "terraform_data" "scratch" { input = "temporary" }` to `main.tf` and run `terraform apply -auto-approve`
  9. `touch /root/tf-lab/.scratch_applied`
  10. `terraform state rm terraform_data.scratch`
  11. `terraform state list` — confirm scratch is gone

tasks:
  - id: "renamed_in_code"
    description: "main.tf defines terraform_data.app_server (the renamed resource) and no longer defines web_server"
  - id: "state_mv_reconciled"
    description: "terraform state list shows app_server tracked in state (renamed via terraform state mv, not destroy+recreate)"
  - id: "state_rm_applied"
    description: "terraform_data.scratch was applied, marked with 'touch /root/tf-lab/.scratch_applied', and then removed from state tracking with terraform state rm"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
  - name: "main"
    user: "root"
    cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  STATE="$LAB/terraform.tfstate"

  # Task 1: renamed in code
  if [ -f "$MAIN" ] \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'resource[[:space:]]+"terraform_data"[[:space:]]+"app_server"' \
    && ! grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'resource[[:space:]]+"terraform_data"[[:space:]]+"web_server"'; then
    echo "CHECK:renamed_in_code:PASS:main.tf defines app_server and no longer defines web_server"
  else
    echo "CHECK:renamed_in_code:FAIL:main.tf should define terraform_data.app_server and no longer define terraform_data.web_server"
  fi

  # Task 2: state was reconciled via mv (app_server present in state, web_server absent)
  if [ -f "$STATE" ]; then
    HAS_APP=$(grep -c '"app_server"' "$STATE" 2>/dev/null)
    HAS_WEB=$(grep -c '"web_server"' "$STATE" 2>/dev/null)
    if [ "${HAS_APP:-0}" -gt 0 ] && [ "${HAS_WEB:-0}" -eq 0 ]; then
      echo "CHECK:state_mv_reconciled:PASS:state tracks app_server and no longer tracks web_server"
    else
      echo "CHECK:state_mv_reconciled:FAIL:Run 'terraform state mv terraform_data.web_server terraform_data.app_server' to reconcile state with the renamed resource"
    fi
  else
    echo "CHECK:state_mv_reconciled:FAIL:No terraform.tfstate found. Run terraform init && terraform apply -auto-approve first"
  fi

  # Task 3: scratch resource removed from state (but config may still reference it — we only check state)
  if [ -f "$STATE" ] && ! grep -q '"scratch"' "$STATE" 2>/dev/null; then
    if [ -f "$LAB/.scratch_applied" ]; then
      echo "CHECK:state_rm_applied:PASS:scratch was applied and is no longer tracked in state"
    else
      echo "CHECK:state_rm_applied:FAIL:scratch must be applied first (terraform apply), then removed with 'terraform state rm terraform_data.scratch'"
    fi
  else
    echo "CHECK:state_rm_applied:FAIL:terraform_data.scratch is still tracked in state — run 'terraform state rm terraform_data.scratch' after applying it"
  fi

hints:
  - "terraform state list shows every resource address Terraform currently tracks."
  - "terraform state mv <old_address> <new_address> updates the state file's address without touching real infrastructure — use it whenever you rename a resource in code."
  - "After a state mv, terraform plan should report 'No changes' if the code and state agree."
  - "terraform state rm <address> stops Terraform from tracking a resource but does NOT destroy it — the resource is simply orphaned from state."
  - "For the scratch resource, apply it first so it exists in state, then run 'touch /root/tf-lab/.scratch_applied' before removing it with state rm, so the checker can tell it was really applied."
