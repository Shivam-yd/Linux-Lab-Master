# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Output Values
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-output-values"
title: "Output Values"
track: "terraform"
level: 1
category: "Terraform Fundamentals"
difficulty: "beginner"
summary: "Expose a resource's computed value with an output block, then read it back with terraform output."
estimatedMinutes: 15
order: 120

objectives:
- "Declare an output block that exposes a resource attribute"
- "Apply the config and read the output with terraform output"
- "Redirect a single output's raw value to a file with -raw"

instructions: |
  ## Output Values

  **Scenario**
  Your CI pipeline applies Terraform and then needs to pass the resulting resource identifier downstream to a deployment script — but the script has no way to read `terraform.tfstate` directly. The platform team has asked you to add an `output` block so the value is accessible via `terraform output`, and to write the raw value to a file that the downstream script can consume.

  **Your task:** Write `main.tf` with a `terraform_data.message` resource, write `outputs.tf` declaring a `message_value` output referencing `terraform_data.message.output`, apply the config, and write the raw output value to `/root/tf-lab/message.txt`.

  **What You'll Deliver**
  - `outputs.tf` declaring `output "message_value"` referencing `terraform_data.message.output`
  - `/root/tf-lab/message.txt` containing the raw output value written by `terraform output -raw`

  ## Steps

  1. `cd /root/tf-lab`
  2. Write `main.tf` with `resource "terraform_data" "message" { input = "shipped" }`
  3. Write `outputs.tf` with `output "message_value" { value = terraform_data.message.output }`
  4. `terraform init`
  5. `terraform apply -auto-approve`
  6. `terraform output message_value`
  7. `terraform output -raw message_value > /root/tf-lab/message.txt`

tasks:
- id: "output_declared"
  description: "outputs.tf declares an output named message_value that references terraform_data.message.output"
- id: "output_extracted"
  description: "The raw output value was written to /root/tf-lab/message.txt using terraform output -raw"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  OUT="$LAB/outputs.tf"
  FILE="$LAB/message.txt"

  # CHECK: output_declared
  if [ -f "$OUT" ] \
    && grep -v '^[[:space:]]*#' "$OUT" | grep -qE 'output[[:space:]]+"message_value"' \
    && grep -v '^[[:space:]]*#' "$OUT" | grep -qE 'terraform_data\.message\.output'; then
    echo "CHECK:output_declared:PASS:message_value output references terraform_data.message.output"
  else
    echo "CHECK:output_declared:FAIL:outputs.tf must declare output \"message_value\" { value = terraform_data.message.output }"
  fi

  # CHECK: output_extracted
  if [ -s "$FILE" ] && grep -q "shipped" "$FILE" 2>/dev/null; then
    echo "CHECK:output_extracted:PASS:message.txt contains the raw output value"
  else
    echo "CHECK:output_extracted:FAIL:Run terraform output -raw message_value > /root/tf-lab/message.txt"
  fi

hints:
- "output blocks live at the top level, not nested inside a resource."
- "terraform_data exposes its input back as .output — that's what most of these labs read from."
- "terraform output -raw <name> prints the bare value with no quotes, ideal for piping into a file or script."

