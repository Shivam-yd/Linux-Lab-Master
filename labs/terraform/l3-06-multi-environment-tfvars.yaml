# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Multi-Environment Configs with -var-file
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-multi-environment-tfvars"
title: "Multi-Environment Configs with -var-file"
track: "terraform"
level: 3
category: "Terraform Language"
difficulty: "advanced"
summary: "Drive the same config into different shapes for dev and prod using separate .tfvars files selected explicitly with -var-file."
estimatedMinutes: 25
order: 390

objectives:
- "Create separate dev.tfvars and prod.tfvars files with different values"
- "Apply the same config twice, once per environment, using -var-file"
- "Confirm each environment's applied result reflects its own tfvars file"

instructions: |
  ## Multi-Environment Configs with -var-file

  **Scenario**
  Your team runs the same Terraform config against dev and prod, but with different sizing. \`terraform.tfvars\` loads automatically, which is exactly the ambiguity you don't want when multiple environments are involved — named files like \`dev.tfvars\` and \`prod.tfvars\` must be passed explicitly with \`-var-file\`, so it's always clear which environment is active.

  **Your task:** Create \`dev.tfvars\` and \`prod.tfvars\` in \`/root/tf-lab\` with different values, apply the same config against each, and leave the final applied state on prod.

  No text editor is installed — use heredoc redirection: \`cat > main.tf <<'EOF' ... EOF\`

  **What You'll Deliver**
  - \`dev.tfvars\` and \`prod.tfvars\`, each setting distinct \`instance_count\` and \`environment_label\` values
  - \`terraform.tfstate\` reflecting the prod environment's values (\`environment_label=prod\`, \`instance_count=5\`) as the final applied state

  ## Steps

  1. \`mkdir -p /root/tf-lab && cd /root/tf-lab\`
  2. Create \`variables.tf\`:
     \`\`\`hcl
     variable "instance_count" {
       type = number
     }

     variable "environment_label" {
       type = string
     }
     \`\`\`
  3. Create \`main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "fleet" {
       input = "\${var.environment_label}:\${var.instance_count}"
     }
     \`\`\`
  4. Create \`dev.tfvars\`:
     \`\`\`hcl
     instance_count     = 1
     environment_label  = "dev"
     \`\`\`
  5. Create \`prod.tfvars\`:
     \`\`\`hcl
     instance_count     = 5
     environment_label  = "prod"
     \`\`\`
  6. \`terraform init\`
  7. \`terraform apply -auto-approve -var-file=dev.tfvars\`
  8. Switch environments, leaving this as the final applied state: \`terraform apply -auto-approve -var-file=prod.tfvars\`

tasks:
- id: "both_tfvars_files_exist"
  description: "dev.tfvars and prod.tfvars both exist with distinct instance_count and environment_label values"
- id: "applied_with_prod_tfvars"
  description: "terraform.tfstate reflects the prod environment's values (environment_label=prod, instance_count=5)"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  DEV="$LAB/dev.tfvars"
  PROD="$LAB/prod.tfvars"
  STATE="$LAB/terraform.tfstate"

  # CHECK: both_tfvars_files_exist
  if [ -f "$DEV" ] && [ -f "$PROD" ] \
    && grep -qE 'environment_label[[:space:]]*=[[:space:]]*"dev"' "$DEV" \
    && grep -qE 'environment_label[[:space:]]*=[[:space:]]*"prod"' "$PROD"; then
    echo "CHECK:both_tfvars_files_exist:PASS:dev.tfvars and prod.tfvars both exist with distinct environment_label values"
  else
    echo "CHECK:both_tfvars_files_exist:FAIL:Create dev.tfvars and prod.tfvars, each setting instance_count and environment_label"
  fi

  # CHECK: applied_with_prod_tfvars
  if [ -f "$STATE" ] && grep -q "prod:5" "$STATE" 2>/dev/null; then
    echo "CHECK:applied_with_prod_tfvars:PASS:state reflects the prod environment's values"
  else
    echo "CHECK:applied_with_prod_tfvars:FAIL:Run terraform apply -auto-approve -var-file=prod.tfvars as the final applied state"
  fi

hints:
- "Named .tfvars files (anything other than terraform.tfvars or *.auto.tfvars) require an explicit -var-file=<path> flag."
- "You can pass -var-file multiple times to layer several files, applied in the order given."
- "Leave the final applied state on prod.tfvars — that's what the verification checks for."

