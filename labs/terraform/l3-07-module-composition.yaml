# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Composing Modules Together
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-module-composition"
title: "Composing Modules Together"
track: "terraform"
level: 3
category: "Modules"
difficulty: "advanced"
summary: "Wire the output of one module directly into the input of a second module, building a small dependency chain across module boundaries."
estimatedMinutes: 30
order: 400

objectives:
- "Create two local modules where one's output feeds directly into the other's input"
- "Call both modules from the root config in the correct order"
- "Confirm the second module's applied resource used a value computed by the first"

instructions: |
  ## Composing Modules Together

  **Scenario**
  Reusing one module twice (as in the earlier local-modules lab) is one pattern. Composition is different: your app tier needs a VPC ID that only exists after the network module applies, and you want Terraform to work that ordering out on its own — purely from module B's input referencing module A's output, with no manual sequencing.

  **Your task:** Create two local modules in \`/root/tf-lab\` — \`modules/network\` (exposing a \`vpc_id\` output) and \`modules/app\` (accepting a \`vpc_id\` input) — then wire the root config so \`module.app\`'s \`vpc_id\` comes directly from \`module.network.vpc_id\`, and apply the chain.

  **What You'll Deliver**
  - \`modules/network/\` with \`variables.tf\`, \`main.tf\`, and \`outputs.tf\` exposing \`vpc_id\`
  - \`modules/app/\` with \`variables.tf\` and \`main.tf\` accepting a \`vpc_id\` variable
  - Root config setting \`module "app"\`'s \`vpc_id = module.network.vpc_id\`, chaining the two modules
  - \`terraform.tfstate\` showing \`module.app.terraform_data.server\`'s input built from \`module.network\`'s applied value

  ## Steps

  1. \`mkdir -p /root/tf-lab/modules/network /root/tf-lab/modules/app && cd /root/tf-lab\`
  2. Create \`modules/network/variables.tf\`:
     \`\`\`hcl
     variable "cidr_block" {
       type = string
     }
     \`\`\`
  3. Create \`modules/network/main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "vpc" {
       input = "vpc-\${var.cidr_block}"
     }
     \`\`\`
  4. Create \`modules/network/outputs.tf\`:
     \`\`\`hcl
     output "vpc_id" {
       value = terraform_data.vpc.output
     }
     \`\`\`
  5. Create \`modules/app/variables.tf\`:
     \`\`\`hcl
     variable "vpc_id" {
       type = string
     }
     \`\`\`
  6. Create \`modules/app/main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "server" {
       input = "server-in-\${var.vpc_id}"
     }
     \`\`\`
  7. Create the root \`main.tf\`, composing them:
     \`\`\`hcl
     module "network" {
       source     = "./modules/network"
       cidr_block = "10.0.0.0/16"
     }

     module "app" {
       source = "./modules/app"
       vpc_id = module.network.vpc_id
     }
     \`\`\`
  8. \`terraform init\`
  9. \`terraform apply -auto-approve\`

tasks:
- id: "network_module_exists"
  description: "modules/network/ has variables.tf, main.tf, and outputs.tf exposing vpc_id"
- id: "app_module_exists"
  description: "modules/app/ has variables.tf and main.tf accepting a vpc_id variable"
- id: "root_wires_modules_together"
  description: "Root main.tf sets module \"app\"'s vpc_id = module.network.vpc_id, chaining the two modules"
- id: "chained_apply_succeeded"
  description: "terraform.tfstate shows module.app.terraform_data.server's input built from module.network's applied vpc value"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab/modules/network /root/tf-lab/modules/app

verifyScript: |
  LAB=/root/tf-lab
  NET_DIR="$LAB/modules/network"
  APP_DIR="$LAB/modules/app"
  ROOT_MAIN="$LAB/main.tf"
  STATE="$LAB/terraform.tfstate"

  # CHECK: network_module_exists
  if [ -f "$NET_DIR/variables.tf" ] && [ -f "$NET_DIR/main.tf" ] && [ -f "$NET_DIR/outputs.tf" ] \
    && grep -qE 'output[[:space:]]+"vpc_id"' "$NET_DIR/outputs.tf" 2>/dev/null; then
    echo "CHECK:network_module_exists:PASS:network module exposes a vpc_id output"
  else
    echo "CHECK:network_module_exists:FAIL:Create modules/network/{variables.tf,main.tf,outputs.tf} exposing output \"vpc_id\""
  fi

  # CHECK: app_module_exists
  if [ -f "$APP_DIR/variables.tf" ] && [ -f "$APP_DIR/main.tf" ] \
    && grep -qE 'variable[[:space:]]+"vpc_id"' "$APP_DIR/variables.tf" 2>/dev/null; then
    echo "CHECK:app_module_exists:PASS:app module accepts a vpc_id variable"
  else
    echo "CHECK:app_module_exists:FAIL:Create modules/app/{variables.tf,main.tf} with variable \"vpc_id\""
  fi

  # CHECK: root_wires_modules_together
  if [ -f "$ROOT_MAIN" ] && grep -v '^[[:space:]]*#' "$ROOT_MAIN" | grep -qE 'vpc_id[[:space:]]*=[[:space:]]*module\.network\.vpc_id'; then
    echo "CHECK:root_wires_modules_together:PASS:root config chains module.network.vpc_id into module.app"
  else
    echo "CHECK:root_wires_modules_together:FAIL:Root main.tf must set module \"app\"'s vpc_id = module.network.vpc_id"
  fi

  # CHECK: chained_apply_succeeded
  if [ -f "$STATE" ] && grep -q "server-in-vpc-10.0.0.0/16" "$STATE" 2>/dev/null; then
    echo "CHECK:chained_apply_succeeded:PASS:app module's applied value was built from the network module's output"
  else
    echo "CHECK:chained_apply_succeeded:FAIL:Run terraform apply -auto-approve so the chained modules apply successfully"
  fi

hints:
- "Reference one module's output as another module's input the same way you'd reference any other expression: module.<name>.<output>."
- "Terraform infers that module.network must apply before module.app purely from this reference — no depends_on needed."
- "Keep each module's variables.tf, main.tf, and (for network) outputs.tf focused on just that module's own resource."

