# ──────────────────────────────────────────────────────────────────────────────
# Linux Lab: Terraform Provisioners (local-exec)
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-provisioners"
title: "Terraform Provisioners: local-exec & Triggers"
track: "terraform"
level: 3
category: "Infrastructure as Code"
difficulty: "advanced"
summary: "Run local shell commands as part of a resource's lifecycle with the local-exec provisioner, and control re-execution with triggers_replace."
estimatedMinutes: 30
order: 320

objectives:
  - "Attach a local-exec provisioner to a resource"
  - "Use a provisioner to write a file that proves it ran"
  - "Use triggers_replace so the provisioner re-runs when an input changes"
  - "Apply twice with different input and confirm the provisioner ran both times"

instructions: |
  ## Terraform Provisioners: local-exec & Triggers

  **Scenario**
  Your team's deployment pipeline needs to append a timestamped entry to a local audit log every time a new release version is applied — something no Terraform provider handles. After the first deploy the team noticed that re-running apply with a new version did nothing because Terraform saw no diff. You need to wire up a `local-exec` provisioner with `triggers_replace` so the audit log is written on every version change.

  **Your task:** Write `variables.tf` with a `release_version` variable, write `main.tf` with a `terraform_data` resource that uses `triggers_replace` and a `local-exec` provisioner that appends to `/root/tf-lab/deploy.log`, then apply twice with different versions and confirm both lines appear in the log.

  **What You'll Deliver**
  - `main.tf` with a `terraform_data` resource containing a `local-exec` provisioner and `triggers_replace`
  - `/root/tf-lab/deploy.log` containing at least two distinct deployed-version lines

  ## Steps

  1. `cd /root/tf-lab`
  2. Write `variables.tf` declaring `variable "release_version" { type = string; default = "v1.0.0" }`
  3. Write `main.tf` with a `terraform_data "deploy"` resource: set `triggers_replace = [var.release_version]` and a `provisioner "local-exec"` whose command appends `"deployed ${self.input}"` to `/root/tf-lab/deploy.log`
  4. `terraform init`
  5. `terraform apply -auto-approve -var="release_version=v1.0.0"`
  6. `terraform apply -auto-approve -var="release_version=v1.1.0"`
  7. `cat /root/tf-lab/deploy.log` — confirm two distinct lines appear

tasks:
  - id: "provisioner_defined"
    description: "main.tf defines a terraform_data resource with a local-exec provisioner"
  - id: "triggers_replace_used"
    description: "The resource uses triggers_replace so it re-runs the provisioner when release_version changes"
  - id: "provisioner_ran_twice"
    description: "/root/tf-lab/deploy.log contains two distinct deployed-version lines, proving the provisioner ran on both applies"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
  - name: "main"
    user: "root"
    cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  LOG="$LAB/deploy.log"

  # Task 1: provisioner defined
  if [ -f "$MAIN" ] \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'resource[[:space:]]+"terraform_data"' \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'provisioner[[:space:]]+"local-exec"'; then
    echo "CHECK:provisioner_defined:PASS:terraform_data resource with a local-exec provisioner found"
  else
    echo "CHECK:provisioner_defined:FAIL:main.tf must define a terraform_data resource with a provisioner \"local-exec\" { command = ... } block"
  fi

  # Task 2: triggers_replace used
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'triggers_replace[[:space:]]*='; then
    echo "CHECK:triggers_replace_used:PASS:triggers_replace found on the resource"
  else
    echo "CHECK:triggers_replace_used:FAIL:main.tf is missing triggers_replace = [var.release_version] on the resource"
  fi

  # Task 3: provisioner actually ran twice with different content
  if [ -f "$LOG" ] && [ "$(sort -u "$LOG" | wc -l)" -ge 2 ]; then
    echo "CHECK:provisioner_ran_twice:PASS:deploy.log has at least two distinct deployed-version lines"
  else
    echo "CHECK:provisioner_ran_twice:FAIL:deploy.log is missing or doesn't show two different runs. Apply once, change release_version, apply again."
  fi

hints:
  - "Provisioners are attached inside a resource block, not a separate top-level block: resource \"terraform_data\" \"deploy\" { provisioner \"local-exec\" { command = ... } }"
  - "Reference the resource's own input inside the provisioner with self.input."
  - "triggers_replace = [var.release_version] forces replacement (destroy+recreate) whenever that value changes, which is what reruns the provisioner."
  - "If deploy.log only has one line after two applies, triggers_replace is probably missing — Terraform saw no change and skipped the resource."
