# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: for Expressions
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-for-expressions"
title: "for Expressions"
track: "terraform"
level: 3
category: "Terraform Language"
difficulty: "advanced"
summary: "Transform a list or map into a new list or map using a for expression, including a filter clause."
estimatedMinutes: 25
order: 340

objectives:
- "Write a for expression that transforms a list into a new list"
- "Write a for expression that transforms a list into a map"
- "Add an if clause to a for expression to filter elements"

instructions: |
  ## for Expressions

  **Scenario**
  Your team manages a platform with dozens of microservices, including several deprecated "legacy-*" workloads still listed in the shared service registry. A new deployment script needs three different views of that list: uppercased names for log labels, a name-to-length map for a config validator, and a filtered list with all legacy services stripped out. Hand-rolling these with count or repeated locals is error-prone — for expressions handle all three in a single pass.

  **Your task:** Write `variables.tf` and `main.tf` in `/root/tf-lab` that use for expressions to produce `upper_names` (list→list), `name_lengths` (list→map), and `active_names` (list filtered by an `if` clause), then apply the configuration.

  No text editor is installed — use heredoc redirection: `cat > main.tf <<'EOF' ... EOF`

  **What You'll Deliver**
  - `locals.upper_names` built with a for expression that uppercases every element of `var.service_names`
  - `locals.name_lengths` built with a for expression producing a `name => length(name)` map
  - `locals.active_names` built with a for expression using an `if` clause to exclude any name containing `"legacy"`
  - Configuration applied with `legacy-batch` absent from the `active_only` resource's state value

  ## Steps

  1. `mkdir -p /root/tf-lab && cd /root/tf-lab`
  2. Create `variables.tf`:
     ```hcl
     variable "service_names" {
       type    = list(string)
       default = ["auth", "billing", "search", "legacy-batch"]
     }
     ```
  3. Create `main.tf`:
     ```hcl
     locals {
       upper_names  = [for name in var.service_names : upper(name)]
       name_lengths = { for name in var.service_names : name => length(name) }
       active_names = [for name in var.service_names : name if !strcontains(name, "legacy")]
     }

     resource "terraform_data" "summary" {
       input = join(",", local.upper_names)
     }

     resource "terraform_data" "active_only" {
       input = join(",", local.active_names)
     }
     ```
  4. `terraform init`
  5. `terraform apply -auto-approve`
  6. Confirm: `grep "auth,billing,search" terraform.tfstate` (legacy-batch must be absent)

tasks:
- id: "list_to_list_for"
  description: "locals.upper_names is built with a for expression that upper()s each element of var.service_names"
- id: "list_to_map_for"
  description: "locals.name_lengths is built with a for expression producing a map of name => length(name)"
- id: "filtered_for_used"
  description: "locals.active_names uses a for expression with an if clause to exclude any name containing 'legacy'"
- id: "applied_correctly"
  description: "terraform.tfstate shows active_only's joined value with legacy-batch excluded"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"
  STATE="$LAB/terraform.tfstate"

  # CHECK: list_to_list_for
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE '\[for[[:space:]]+name[[:space:]]+in[[:space:]]+var\.service_names[[:space:]]*:[[:space:]]*upper\(name\)\]'; then
    echo "CHECK:list_to_list_for:PASS:upper_names uses a for expression over service_names with upper()"
  else
    echo "CHECK:list_to_list_for:FAIL:locals.upper_names must be [for name in var.service_names : upper(name)]"
  fi

  # CHECK: list_to_map_for
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE '\{[[:space:]]*for[[:space:]]+name[[:space:]]+in[[:space:]]+var\.service_names[[:space:]]*:[[:space:]]*name[[:space:]]*=>'; then
    echo "CHECK:list_to_map_for:PASS:name_lengths uses a for expression producing a map"
  else
    echo "CHECK:list_to_map_for:FAIL:locals.name_lengths must be { for name in var.service_names : name => length(name) }"
  fi

  # CHECK: filtered_for_used
  if [ -f "$MAIN" ] && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE '\[for[[:space:]]+name[[:space:]]+in[[:space:]]+var\.service_names[[:space:]]*:[[:space:]]*name[[:space:]]+if[[:space:]]'; then
    echo "CHECK:filtered_for_used:PASS:active_names uses a for expression with an if clause"
  else
    echo "CHECK:filtered_for_used:FAIL:locals.active_names must use [for name in var.service_names : name if ...] with a filter condition"
  fi

  # CHECK: applied_correctly
  if [ -f "$STATE" ] && grep -q "auth,billing,search" "$STATE" 2>/dev/null && ! grep -q "legacy-batch\"" "$STATE" 2>/dev/null; then
    echo "CHECK:applied_correctly:PASS:active_only's applied value excludes legacy-batch"
  else
    echo "CHECK:applied_correctly:FAIL:Apply the config and confirm active_only.output is \"auth,billing,search\" with legacy-batch filtered out"
  fi

hints:
- "List-to-list for: [for item in collection : expression] — one output element per input element."
- "List-to-map for: { for item in collection : key_expr => value_expr } — braces instead of brackets."
- "Add if condition right after the value expression to filter: [for item in collection : item if condition]."
- "strcontains(string, substr) returns true if substr appears anywhere in string — useful for name-based filters."

