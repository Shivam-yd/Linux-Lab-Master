# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Detecting Drift with -refresh-only
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-refresh-only-plan"
title: "Detecting Drift with -refresh-only"
track: "terraform"
level: 3
category: "State Management"
difficulty: "advanced"
summary: "Simulate configuration drift by editing state directly, then use a refresh-only plan and apply to reconcile state with real-world reality without touching resources."
estimatedMinutes: 25
order: 380

objectives:
- "Apply a resource normally"
- "Simulate drift by editing terraform.tfstate's recorded attribute directly"
- "Run terraform plan -refresh-only to see the drift, then terraform apply -refresh-only to accept it into state"

instructions: |
  ## Detecting Drift with -refresh-only

  **Scenario**
  A resource in your infrastructure got changed outside of Terraform — a manual console edit, another tool — and now state no longer matches reality. Before touching anything, you need to see exactly what drifted without Terraform proposing to "fix" it by recreating resources. A refresh-only plan shows the difference between recorded state and current reality without proposing any resource changes; refresh-only apply updates just the state record to match.

  **Your task:** Apply a resource in \`/root/tf-lab\` normally, simulate drift by editing \`terraform.tfstate\` directly, then run a refresh-only plan and apply to practice the reconciliation workflow. (Since \`terraform_data\` has no real backing system, a genuine refresh won't detect the simulated edit on its own — the point of this lab is practicing the correct command sequence.)

  No text editor is installed — use heredoc redirection: \`cat > main.tf <<'EOF' ... EOF\`

  **What You'll Deliver**
  - \`terraform_data.config_flag\` applied at least once, recorded in \`terraform.tfstate\`
  - A refresh-only apply run after the initial apply

  ## Steps

  1. \`mkdir -p /root/tf-lab && cd /root/tf-lab\`
  2. Create \`main.tf\`:
     \`\`\`hcl
     resource "terraform_data" "config_flag" {
       input = "enabled"
     }
     \`\`\`
  3. \`terraform init\`
  4. \`terraform apply -auto-approve\`
  5. Simulate an out-of-band change directly in state: \`sed -i 's/"enabled"/"disabled-by-someone-else"/' terraform.tfstate\`
  6. Run a refresh-only plan: \`terraform plan -refresh-only\`
  7. Run a refresh-only apply: \`terraform apply -auto-approve -refresh-only\`

tasks:
- id: "resource_applied"
  description: "terraform_data.config_flag has been applied at least once (terraform.tfstate exists with the resource recorded)"
- id: "refresh_only_apply_ran"
  description: "A refresh-only apply was run after the initial apply (terraform.tfstate's serial/lineage was touched by a second terraform run)"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  STATE="$LAB/terraform.tfstate"
  BACKUP="$LAB/terraform.tfstate.backup"

  # CHECK: resource_applied
  if [ -f "$STATE" ] && grep -q '"config_flag"' "$STATE" 2>/dev/null; then
    echo "CHECK:resource_applied:PASS:config_flag is recorded in state"
  else
    echo "CHECK:resource_applied:FAIL:Apply main.tf first (terraform init && terraform apply -auto-approve)"
  fi

  # CHECK: refresh_only_apply_ran
  # A refresh (plan or apply) writes a backup of the prior state — presence of a backup file
  # after the initial apply is a reliable signal that a second terraform run touched state.
  if [ -f "$BACKUP" ]; then
    echo "CHECK:refresh_only_apply_ran:PASS:a subsequent terraform run (the refresh-only apply) touched state, as shown by the state backup file"
  else
    echo "CHECK:refresh_only_apply_ran:FAIL:After the initial apply, run terraform apply -auto-approve -refresh-only to reconcile state"
  fi

hints:
- "terraform plan -refresh-only never proposes create/update/destroy — it only shows differences between state and (attempted) real-world refresh."
- "terraform apply -refresh-only writes the refreshed values into state but does not modify any actual resource."
- "Editing terraform.tfstate by hand (e.g. with sed) is only safe in a lab — never do this against real infrastructure state."

