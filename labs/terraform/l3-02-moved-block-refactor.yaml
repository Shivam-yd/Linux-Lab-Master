# ──────────────────────────────────────────────────────────────────────────────
# Terraform Lab: Refactoring Safely with moved Blocks
# ──────────────────────────────────────────────────────────────────────────────

id: "terraform-moved-block-refactor"
title: "Refactoring Safely with moved Blocks"
track: "terraform"
level: 3
category: "State Management"
difficulty: "advanced"
summary: "Rename a resource in configuration without Terraform destroying and recreating it, using a moved block to carry state forward."
estimatedMinutes: 25
order: 350

objectives:
- "Apply a resource under its original name"
- "Rename it in configuration and add a moved block pointing old -> new"
- "Confirm terraform plan shows no destroy/create — only a state move"

instructions: |
  ## Refactoring Safely with moved Blocks

  **Scenario**
  Your team standardised resource naming conventions after a compliance audit. The Terraform config for the caching layer still uses the old label `cache_instance`, but the new standard requires `cache_primary`. Simply renaming the label in the `.tf` file would cause Terraform to destroy the live Redis instance and create a fresh one — an outage your SLA cannot absorb. You need to rename the resource in code without touching the running infrastructure.

  **Your task:** Apply `terraform_data.cache_instance` under its original name, then rename it to `cache_primary` in `main.tf` and add a `moved` block so that `terraform plan` reports a state move with zero destroys or creates.

  **What You'll Deliver**
  - `terraform_data.cache_instance` applied under its original name
  - A `moved` block in `main.tf` declaring `from = terraform_data.cache_instance` and `to = terraform_data.cache_primary`
  - State showing only `terraform_data.cache_primary` with no recreation (zero destroys)

  ## Steps

  1. `mkdir -p /root/tf-lab && cd /root/tf-lab`
  2. Create `main.tf` with the original resource name:
     ```hcl
     resource "terraform_data" "cache_instance" {
       input = "redis-primary"
     }
     ```
  3. `terraform init && terraform apply -auto-approve`
  4. Update `main.tf` to rename the resource and add the `moved` block:
     ```hcl
     resource "terraform_data" "cache_primary" {
       input = "redis-primary"
     }

     moved {
       from = terraform_data.cache_instance
       to   = terraform_data.cache_primary
     }
     ```
  5. `terraform plan` — verify output shows `1 to move, 0 to add, 0 to change, 0 to destroy`
  6. `terraform apply -auto-approve`
  7. `terraform state list` — confirm only `terraform_data.cache_primary` appears

tasks:
- id: "original_applied"
  description: "terraform_data.cache_instance was applied under its original name before the rename"
- id: "moved_block_declared"
  description: "main.tf includes a moved block with from = terraform_data.cache_instance and to = terraform_data.cache_primary"
- id: "renamed_without_recreation"
  description: "terraform state list shows terraform_data.cache_primary and does NOT show terraform_data.cache_instance, with only one resource instance total"

image: "hashicorp/terraform:1.9"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
- name: "main"
  user: "root"
  cwd: "/root/tf-lab"

setupScript: |
  mkdir -p /root/tf-lab

verifyScript: |
  LAB=/root/tf-lab
  MAIN="$LAB/main.tf"

  # CHECK: original_applied
  # We can no longer see the original name once renamed+moved, so infer success from the moved block + a clean single instance.
  if [ -f "$MAIN" ]; then
    echo "CHECK:original_applied:PASS:proceeding to verify the rename (original apply is implied by a clean moved state below)"
  else
    echo "CHECK:original_applied:FAIL:Create and apply main.tf with terraform_data.cache_instance first"
  fi

  # CHECK: moved_block_declared
  if [ -f "$MAIN" ] \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE '^moved[[:space:]]*\{' \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'from[[:space:]]*=[[:space:]]*terraform_data\.cache_instance' \
    && grep -v '^[[:space:]]*#' "$MAIN" | grep -qE 'to[[:space:]]*=[[:space:]]*terraform_data\.cache_primary'; then
    echo "CHECK:moved_block_declared:PASS:main.tf declares a moved block from cache_instance to cache_primary"
  else
    echo "CHECK:moved_block_declared:FAIL:main.tf must include moved { from = terraform_data.cache_instance; to = terraform_data.cache_primary }"
  fi

  # CHECK: renamed_without_recreation
  HAS_NEW=$(terraform state list 2>/dev/null | grep -c '^terraform_data\.cache_primary$' || echo 0)
  HAS_OLD=$(terraform state list 2>/dev/null | grep -c '^terraform_data\.cache_instance$' || echo 0)
  TOTAL=$(terraform state list 2>/dev/null | grep -c '^terraform_data\.' || echo 0)
  if [ "$HAS_NEW" -eq 1 ] && [ "$HAS_OLD" -eq 0 ] && [ "$TOTAL" -eq 1 ]; then
    echo "CHECK:renamed_without_recreation:PASS:state shows cache_primary only — the move preserved the single instance"
  else
    echo "CHECK:renamed_without_recreation:FAIL:Apply the renamed config with the moved block — expect exactly one terraform_data instance, named cache_primary"
  fi

hints:
- "Apply the resource under its ORIGINAL name first — the moved block only helps if there's existing state to move."
- "moved { from = <old_address>; to = <new_address> } goes at the top level of the config, not inside a resource block."
- "terraform plan after adding a moved block should report a move, not a destroy+create — if it shows destroy/create, double check the addresses match exactly."

