# ──────────────────────────────────────────────────────────────────────────────
# Git Lab: Ignoring Files with .gitignore
# ──────────────────────────────────────────────────────────────────────────────

id: "git-gitignore"
title: "Ignoring Files with .gitignore"
track: "git"
level: 1
category: "Git Fundamentals"
difficulty: "beginner"
summary: "Write .gitignore patterns to prevent secrets and build artefacts from being accidentally committed."
estimatedMinutes: 15
order: 700

objectives:
  - "Create a .gitignore file with effective glob patterns"
  - "Use git check-ignore to verify patterns before committing"
  - "Understand the difference between ignored and simply untracked files"
  - "Commit .gitignore so the whole team shares the same rules"

instructions: |
  ## Ignoring Files with .gitignore

  **Scenario**
  A junior engineer just opened a pull request that accidentally includes
  `node_modules/` (400 MB of auto-generated dependencies) and a `.env` file
  containing the production database password. You caught it in review — but
  next time you might not. Your job is to add a `.gitignore` so Git refuses
  to even show these files as staging candidates, and commit it so every
  developer on the team gets the same protection from day one.

  **Your task:** create a `.gitignore` that ignores `node_modules/` and `.env`
  files, verify both patterns work with `git check-ignore`, then commit the
  `.gitignore` itself.

  No text editor is installed — write the file with shell redirection.

  **What You'll Deliver**
  - `.gitignore` created containing patterns for `node_modules/` and `.env`
  - Both patterns confirmed effective with `git check-ignore`
  - `.gitignore` committed to the repository

  ## Steps

  1. `cd /root/project`
  2. Check current status — notice node_modules and .env show as untracked:
     `git status`
  3. Create the .gitignore:
     `printf 'node_modules/\n.env\n*.log\n' > .gitignore`
  4. Test the patterns — each matched path shows the rule that matched it:
     `git check-ignore -v node_modules .env app.log`
  5. Run `git status` again — node_modules, .env, and app.log should be gone from the list
  6. Stage and commit the .gitignore:
     `git add .gitignore && git commit -m "add .gitignore to protect secrets and deps"`
  7. Confirm with: `git log --oneline`

tasks:
  - id: "gitignore_committed"
    description: ".gitignore has been committed and appears in git log"
  - id: "node_modules_ignored"
    description: "node_modules/ matches a pattern in .gitignore"
  - id: "env_ignored"
    description: ".env matches a pattern in .gitignore"

image: "alpine/git:latest"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/project"

setupScript: |
  mkdir -p /root/project/node_modules/lodash
  cd /root/project
  git init -q
  git config user.name "Lab Student"
  git config user.email "student@lab.local"
  echo "# My App" > README.md
  git add README.md
  git commit -q -m "initial commit"
  echo "console.log('lodash')" > node_modules/lodash/index.js
  echo "DB_PASSWORD=supersecret" > .env
  echo "2024-01-01 startup" > app.log

verifyScript: |
  cd /root/project || exit 1

  # CHECK: gitignore_committed
  if git log --all --name-only --format= | grep -qx "\.gitignore"; then
    echo "CHECK:gitignore_committed:PASS:.gitignore is in the commit history"
  else
    echo "CHECK:gitignore_committed:FAIL:.gitignore not yet committed — run: git add .gitignore && git commit -m 'add gitignore'"
  fi

  # CHECK: node_modules_ignored
  if [ -f .gitignore ] && git check-ignore -q node_modules 2>/dev/null; then
    echo "CHECK:node_modules_ignored:PASS:node_modules/ is ignored"
  else
    echo "CHECK:node_modules_ignored:FAIL:Add 'node_modules/' to .gitignore (use printf 'node_modules/\n' > .gitignore)"
  fi

  # CHECK: env_ignored
  if [ -f .gitignore ] && git check-ignore -q .env 2>/dev/null; then
    echo "CHECK:env_ignored:PASS:.env is ignored"
  else
    echo "CHECK:env_ignored:FAIL:Add '.env' to .gitignore"
  fi

hints:
  - "printf 'node_modules/\\n.env\\n' > .gitignore — printf handles \\n better than echo -e in sh."
  - "git check-ignore -v <path> shows which rule matched (file:line:pattern). Exit code 0 = ignored."
  - "After writing .gitignore, run git status — node_modules and .env should disappear from the untracked list."
  - "Commit .gitignore with git add .gitignore && git commit — untracked files don't protect the next person who clones."
