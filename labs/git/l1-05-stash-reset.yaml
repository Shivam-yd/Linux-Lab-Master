# ──────────────────────────────────────────────────────────────────────────────
# Git Lab: Stash & Reset — Undoing Things Safely
# ──────────────────────────────────────────────────────────────────────────────

id: "git-stash-reset"
title: "Stash & Reset: Undoing Things Safely"
track: "git"
level: 1
category: "Git Fundamentals"
difficulty: "beginner"
summary: "Shelve unfinished work with git stash, then permanently undo a bad commit with git reset --hard."
estimatedMinutes: 20
order: 500

objectives:
  - "Temporarily shelve uncommitted work with git stash"
  - "Bring stashed work back with git stash pop"
  - "Permanently discard the most recent commit(s) with git reset --hard"

instructions: |
  ## Stash & Reset: Undoing Things Safely

  **Scenario**
  You're mid-way through adding a third line to `file.txt` when your lead
  asks for an urgent context switch. You need to park your unfinished work
  without committing it, do the other task, then come back. Later you make
  a bad commit by accident and need to erase it completely.

  **Your task:** use `git stash` to park unfinished work and bring it back,
  then use `git reset --hard` to permanently remove a bad commit.

  **What You'll Deliver**
  - `line3` added to `file.txt` via a stash/pop workflow and committed
  - A 4th "oops" commit made then fully undone with `git reset --hard`
  - Clean working tree with exactly 3 commits remaining

  ## Steps

  1. `cd /root/project`
  2. Add a third line but don't commit: `echo "line3" >> file.txt`
  3. Stash it: `git stash` — run `git status` to confirm a clean tree
  4. Bring it back: `git stash pop` — the line reappears
  5. Commit it: `git commit -am "commit 3: add line3"`
  6. Make a bad commit on purpose: `echo "oops" >> file.txt && git commit -am "oops commit"`
  7. Undo it completely: `git reset --hard HEAD~1`
  8. Confirm: `git log --oneline` shows exactly 3 commits, `cat file.txt` shows no "oops"

tasks:
  - id: "stashed_work_committed"
    description: "Line3 was added via a stash/pop workflow and committed as a real commit"
  - id: "bad_commit_reset_away"
    description: "A 4th 'oops' commit was made, then git reset --hard undid it, leaving exactly 3 commits"
  - id: "working_tree_clean"
    description: "git status shows a clean working tree and no stash entries remain"

image: "alpine/git:latest"
entrypoint: ["sleep", "infinity"]
shell: "sh"
terminals:
  - name: "Terminal"
    user: "root"
    cwd: "/root/project"

setupScript: |
  mkdir -p /root/project
  cd /root/project
  git init -q
  git config user.name "Lab Student"
  git config user.email "student@lab.local"
  echo "line1" > file.txt
  git add file.txt
  git commit -q -m "commit 1: add file.txt"
  echo "line2" >> file.txt
  git add file.txt
  git commit -q -m "commit 2: add line2"

verifyScript: |
  cd /root/project || exit 1

  # ── Shared state (computed once so all three checks use identical values) ───
  # tr -d strips leading spaces that busybox wc -l emits (e.g. "      3" → "3")
  count=$(git log --oneline 2>/dev/null | wc -l | tr -d ' \t')
  count=${count:-0}

  # stash_was_used: `git stash` always writes a "reset: moving to HEAD" entry
  # to the HEAD reflog (no ~1 suffix — distinct from reset --hard HEAD~1).
  # This entry survives git stash pop, unlike .git/logs/refs/stash which git
  # deletes when the last stash entry is dropped.
  stash_was_used=0
  git reflog 2>/dev/null | grep -q "reset: moving to HEAD$" && stash_was_used=1

  # reset_found: detects a real backward reset (HEAD~1, HEAD^, etc.).
  # We must NOT use plain "reset:" because git stash internally writes
  # "reset: moving to HEAD" (no suffix) to the HEAD reflog — matching that
  # would let a student who only completed the stash task pass this check
  # without ever running git reset.  The [~^] anchor ensures we only match
  # resets that actually move HEAD to a prior commit.
  reset_found=0
  git reflog 2>/dev/null | grep -qE "reset: moving to HEAD[~^]" && reset_found=1

  stash_count=$(git stash list 2>/dev/null | wc -l | tr -d ' \t')
  stash_count=${stash_count:-0}

  # ── CHECK: stashed_work_committed ──────────────────────────────────────────
  # Requires BOTH: line3 is in the HEAD-committed file AND stash was used.
  # Checking the committed blob (not the working tree) ensures the student
  # actually committed after the stash/pop cycle, not just popped without committing.
  line3_committed=0
  git show HEAD:file.txt 2>/dev/null | grep -qx "line3" && line3_committed=1

  if [ "$stash_was_used" -eq 1 ] && [ "$line3_committed" -eq 1 ]; then
    echo "CHECK:stashed_work_committed:PASS:line3 committed and git stash was used"
  elif [ "$line3_committed" -eq 0 ]; then
    echo "CHECK:stashed_work_committed:FAIL:line3 not in committed file — run: echo 'line3' >> file.txt  then  git stash  then  git stash pop  then  git commit -am 'commit 3: add line3'"
  else
    echo "CHECK:stashed_work_committed:FAIL:line3 was committed but no stash activity found — undo with: git reset HEAD~1  then use git stash / git stash pop before committing"
  fi

  # ── CHECK: bad_commit_reset_away ───────────────────────────────────────────
  # Requires BOTH: exactly 3 commits remain (oops commit removed) AND a reset
  # was recorded in the reflog (proves the student ran git reset, not just
  # never made the oops commit in the first place).
  if [ "$count" -eq 3 ] && [ "$reset_found" -eq 1 ] && ! grep -q "oops" file.txt 2>/dev/null; then
    echo "CHECK:bad_commit_reset_away:PASS:exactly 3 commits remain and the oops commit was reset away"
  elif [ "$reset_found" -eq 0 ]; then
    echo "CHECK:bad_commit_reset_away:FAIL:No reset in history — first make an oops commit: echo 'oops' >> file.txt && git commit -am 'oops commit'  then undo it: git reset --hard HEAD~1"
  elif [ "$count" -ne 3 ]; then
    echo "CHECK:bad_commit_reset_away:FAIL:Expected exactly 3 commits after the reset, found $count — run: git reset --hard HEAD~1"
  else
    echo "CHECK:bad_commit_reset_away:FAIL:file.txt still contains 'oops' — run: git reset --hard HEAD~1"
  fi

  # ── CHECK: working_tree_clean ───────────────────────────────────────────────
  # Guards on count >= 3 AND reset_found so this cannot pass on a fresh
  # container where the setup already leaves a clean tree with no stash entries
  # — without these guards it would be a false positive from the very start.
  porcelain=$(git status --porcelain 2>/dev/null)
  if [ -z "$porcelain" ] && [ "$stash_count" -eq 0 ] && [ "$count" -ge 3 ] && [ "$reset_found" -eq 1 ]; then
    echo "CHECK:working_tree_clean:PASS:working tree clean, no leftover stash entries"
  elif [ "$count" -lt 3 ]; then
    echo "CHECK:working_tree_clean:FAIL:Complete the stash/pop/commit workflow for line3 first (need at least 3 commits)"
  elif [ "$reset_found" -eq 0 ]; then
    echo "CHECK:working_tree_clean:FAIL:Make the oops commit then undo it: git reset --hard HEAD~1"
  elif [ "$stash_count" -gt 0 ]; then
    echo "CHECK:working_tree_clean:FAIL:Leftover stash entries found — run: git stash pop  (or git stash drop to discard)"
  else
    echo "CHECK:working_tree_clean:FAIL:Working tree is not clean — commit or discard remaining changes (run: git status)"
  fi

hints:
  - "git stash saves uncommitted changes onto a stack and cleans your working tree."
  - "git stash pop re-applies the most recent stash AND removes it from the stash list (git stash apply keeps it, pop does not)."
  - "If you committed line3 directly without stashing, undo it first: git reset HEAD~1 (soft reset — keeps your changes in the working tree), then run git stash, git stash pop, and commit again."
  - "HEAD~1 means 'one commit before HEAD' — git reset --hard HEAD~1 rewinds the branch pointer by one commit."
  - "git reset --hard permanently discards the commit's changes from your working tree too — there's no stash safety net for it."
