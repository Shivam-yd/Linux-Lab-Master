name: Deploy Linux Lab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update local repository
        run: |
          cd /opt/Linux-Lab-Master
          git fetch origin
          git reset --hard origin/main

      - name: Run installer
        run: |
          cd /opt/Linux-Lab-Master
          bash installer/install.sh
