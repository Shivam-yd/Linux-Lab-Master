# Map Upgrade header → Connection value to prevent H2C smuggling.
# If the client sends Upgrade: websocket, forward Connection: upgrade.
# Otherwise forward Connection: close so arbitrary upgrades are blocked.
map $http_upgrade $connection_upgrade {
    default   close;
    websocket upgrade;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx:alpine enables gzip by default in the main nginx.conf.
    # Gzip + static file serving can produce ERR_CONTENT_LENGTH_MISMATCH
    # when the Content-Length header is set before compression.  Disable it
    # here so the browser always gets the correct content length.
    gzip off;

    # ── API proxy (REST + WebSocket terminal) ─────────────────────────────────
    location /api/ {
        proxy_pass http://api:8080;

        # HTTP/1.1 required for WebSocket upgrades
        proxy_http_version 1.1;

        # WebSocket upgrade headers — restrict Connection to "upgrade" only
        # when the client actually sent an Upgrade header (prevents H2C smuggling).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for interactive terminal sessions (1 hour)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── No favicon — stop browsers' automatic /favicon.ico request from
    # falling through to the SPA fallback below (which would otherwise
    # serve index.html for it).
    location = /favicon.ico {
        return 404;
        access_log off;
        log_not_found off;
    }

    # ── SPA fallback (React Router) ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
